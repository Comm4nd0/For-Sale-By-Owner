{% extends 'base.html' %}
{% block title %}My Profile - For Sale By Owner{% endblock %}
{% block extra_css %}
<style>
    .profile-card { max-width: 600px; margin: 2rem auto; background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .profile-card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.35rem; font-weight: 500; font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #D4DDD9; border-radius: 6px; font-size: 0.95rem; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: #2D6A4F; box-shadow: 0 0 0 2px rgba(45,106,79,0.15); }
    .form-group input[readonly] { background: #F6F9F7; color: #4A5E56; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn-block { width: 100%; text-align: center; padding: 0.75rem; font-size: 1rem; }
    .section-divider { border: none; border-top: 1px solid #D4DDD9; margin: 2rem 0; }
    .section-title { font-size: 1.1rem; margin-bottom: 1rem; color: #1C2B25; }
    .password-section { margin-top: 1rem; }
</style>
{% endblock %}
{% block content %}
<div class="profile-card">
    <h1>My Profile</h1>
    <div id="error-msg" class="alert alert-error" style="display:none;"></div>
    <div id="success-msg" class="alert alert-success" style="display:none;"></div>

    <form id="profile-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" readonly>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name">
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name">
            </div>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="07700 900000">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="save-btn">Save Changes</button>
    </form>

    <hr class="section-divider">

    <div class="password-section">
        <h2 class="section-title">Change Password</h2>
        <form id="password-form">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="re_new_password">Confirm Password</label>
                    <input type="password" id="re_new_password" required minlength="8">
                </div>
            </div>
            <button type="submit" class="btn btn-secondary btn-block" id="pw-btn">Change Password</button>
        </form>
    </div>

    <hr class="section-divider">

    <div>
        <h2 class="section-title">Saved Searches</h2>
        <div id="saved-searches-list"><p style="color:#4A5E56;">Loading...</p></div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
if (!Auth.requireAuth()) throw '';

// Load profile
async function loadProfile() {
    const res = await fetch('/api/profile/', { headers: Auth.headers() });
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('email').value = data.email || '';
    document.getElementById('first_name').value = data.first_name || '';
    document.getElementById('last_name').value = data.last_name || '';
    document.getElementById('phone').value = data.phone || '';
}

// Save profile
document.getElementById('profile-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';
    const btn = document.getElementById('save-btn');
    btn.disabled = true;

    try {
        const res = await fetch('/api/profile/', {
            method: 'PATCH',
            headers: Auth.headers(),
            body: JSON.stringify({
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                phone: document.getElementById('phone').value,
            })
        });
        if (res.ok) {
            successEl.textContent = 'Profile updated successfully.';
            successEl.style.display = 'block';
        } else {
            const data = await res.json();
            errorEl.textContent = Object.values(data).flat().join(' ');
            errorEl.style.display = 'block';
        }
    } catch {
        errorEl.textContent = 'Network error.';
        errorEl.style.display = 'block';
    }
    btn.disabled = false;
});

// Change password
document.getElementById('password-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    const newPw = document.getElementById('new_password').value;
    if (newPw !== document.getElementById('re_new_password').value) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
    }

    const btn = document.getElementById('pw-btn');
    btn.disabled = true;
    try {
        const res = await fetch('/auth/users/set_password/', {
            method: 'POST',
            headers: Auth.headers(),
            body: JSON.stringify({
                current_password: document.getElementById('current_password').value,
                new_password: newPw,
                re_new_password: newPw,
            })
        });
        if (res.ok || res.status === 204) {
            successEl.textContent = 'Password changed successfully.';
            successEl.style.display = 'block';
            document.getElementById('password-form').reset();
        } else {
            const data = await res.json();
            const msgs = [];
            for (const v of Object.values(data)) msgs.push(...(Array.isArray(v) ? v : [v]));
            errorEl.textContent = msgs.join(' ') || 'Failed to change password.';
            errorEl.style.display = 'block';
        }
    } catch {
        errorEl.textContent = 'Network error.';
        errorEl.style.display = 'block';
    }
    btn.disabled = false;
});

// Load saved searches
async function loadSavedSearches() {
    const container = document.getElementById('saved-searches-list');
    try {
        const res = await fetch('/api/saved-searches/', { headers: Auth.headers() });
        const data = await res.json();
        const items = data.results || data;
        if (!items.length) {
            container.innerHTML = '<p style="color:#4A5E56;">No saved searches yet. Search for properties and save your criteria.</p>';
            return;
        }
        container.innerHTML = items.map(s => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:0.75rem 0; border-bottom:1px solid #D4DDD9;">
                <div>
                    <strong>${s.name || 'Saved Search'}</strong>
                    <span style="color:#4A5E56; font-size:0.85rem; margin-left:0.5rem;">
                        ${[s.location, s.property_type, s.min_bedrooms ? s.min_bedrooms + '+ bed' : ''].filter(Boolean).join(', ')}
                    </span>
                    ${s.email_alerts ? '<span style="background:#D8F3DC; color:#1A3C2E; font-size:0.75rem; padding:2px 6px; border-radius:3px; margin-left:0.5rem;">Alerts On</span>' : ''}
                </div>
                <button class="btn btn-danger" style="padding:0.3rem 0.7rem; font-size:0.8rem;" onclick="deleteSavedSearch(${s.id})">Delete</button>
            </div>
        `).join('');
    } catch {
        container.innerHTML = '<p style="color:#B03A2E;">Failed to load saved searches.</p>';
    }
}

async function deleteSavedSearch(id) {
    await fetch('/api/saved-searches/' + id + '/', { method: 'DELETE', headers: Auth.headers() });
    loadSavedSearches();
}

loadProfile();
loadSavedSearches();
</script>
{% endblock %}
