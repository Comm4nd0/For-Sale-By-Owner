{% extends "base.html" %}

{% block title %}My Service - For Sale By Owner{% endblock %}

{% block extra_css %}
<style>
    .my-service-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    .my-service-header h1 { font-size: 1.5rem; color: #1A3C2E; }
    .my-service-header .actions { display: flex; gap: 0.5rem; }

    .status-badge { display: inline-flex; align-items: center; padding: 0.25rem 0.65rem; border-radius: 14px; font-size: 0.8rem; font-weight: 600; }
    .status-draft { background: #D4DDD9; color: #4A5E56; }
    .status-pending_review { background: #FFF0D4; color: #C9872A; }
    .status-active { background: #D8F3DC; color: #1A3C2E; }
    .status-suspended { background: #f8d7d4; color: #B03A2E; }
    .status-withdrawn { background: #D4DDD9; color: #4A5E56; }

    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #FFFFFF; border: 1px solid #D4DDD9; border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: #1A3C2E; }
    .stat-card .label { font-size: 0.85rem; color: #4A5E56; }

    .section-card { background: #FFFFFF; border: 1px solid #D4DDD9; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .section-card h3 { color: #1A3C2E; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #D4DDD9; }

    .detail-row { display: flex; justify-content: space-between; padding: 0.4rem 0; }
    .detail-label { color: #4A5E56; }
    .detail-value { font-weight: 500; }

    .provider-logo-sm { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }

    .reviews-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .review-card { background: #F6F9F7; border: 1px solid #D4DDD9; border-radius: 8px; padding: 0.75rem; }
    .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
    .review-author { font-weight: 600; color: #1A3C2E; font-size: 0.9rem; }
    .review-date { font-size: 0.8rem; color: #8FA89E; }
    .review-stars { color: #C9872A; font-size: 0.9rem; }
    .review-text { font-size: 0.85rem; color: #4A5E56; margin-top: 0.25rem; }

    .empty-state { text-align: center; padding: 3rem 1rem; }
    .empty-state h3 { color: #1A3C2E; margin-bottom: 0.75rem; }
    .empty-state p { color: #4A5E56; margin-bottom: 1.5rem; }

    /* Edit form */
    .edit-form { display: none; }
    .edit-form.active { display: block; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; font-weight: 500; color: #4A5E56; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #D4DDD9; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group small { display: block; margin-top: 0.25rem; font-size: 0.8rem; color: #8FA89E; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .category-checkboxes { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .category-checkboxes label {
        display: inline-flex; align-items: center; gap: 0.35rem;
        padding: 0.4rem 0.75rem; border-radius: 20px; font-size: 0.85rem;
        border: 1px solid #D4DDD9; background: #FFFFFF; color: #1A3C2E;
        cursor: pointer; transition: all 0.15s;
    }
    .category-checkboxes input[type="checkbox"] { display: none; }
    .category-checkboxes input[type="checkbox"]:checked + label { background: #2D6A4F; color: white; border-color: #2D6A4F; }

    @media (max-width: 768px) { .form-row-2 { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<div id="my-service-content">
    <p>Loading...</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (!Auth.requireAuth()) { /* redirects */ }

    let providerData = null;
    let allCategories = [];

    function renderReview(r) {
        const date = new Date(r.created_at).toLocaleDateString();
        return `<div class="review-card">
            <div class="review-header">
                <span class="review-author">${escHtml(r.reviewer_name)}</span>
                <span class="review-date">${date}</span>
            </div>
            <div class="review-stars">${'&#9733;'.repeat(r.rating)}${'&#9734;'.repeat(5 - r.rating)}</div>
            ${r.comment ? `<div class="review-text">${escHtml(r.comment)}</div>` : ''}
        </div>`;
    }

    function renderViewMode(p) {
        const statusClass = 'status-' + p.status;
        const statusLabels = { draft: 'Draft', pending_review: 'Pending Review', active: 'Active', suspended: 'Suspended', withdrawn: 'Withdrawn' };
        const catTags = (p.categories || []).map(c => escHtml(c.name)).join(', ');
        const logoHtml = p.logo ? `<img src="${p.logo}" class="provider-logo-sm" alt="Logo">` : '';

        return `
            <div class="my-service-header">
                <h1>${logoHtml} ${escHtml(p.business_name)}</h1>
                <div class="actions">
                    <span class="status-badge ${statusClass}">${statusLabels[p.status] || p.status}</span>
                    <button class="btn btn-secondary" onclick="toggleEdit()">Edit</button>
                    <a href="/services/${p.slug}/" class="btn btn-secondary">View Public Page</a>
                </div>
            </div>

            <div class="stat-cards">
                <div class="stat-card"><div class="value">${p.average_rating ? p.average_rating.toFixed(1) : '—'}</div><div class="label">Rating</div></div>
                <div class="stat-card"><div class="value">${p.review_count || 0}</div><div class="label">Reviews</div></div>
                <div class="stat-card"><div class="value">${p.is_verified ? '&#10003;' : '&#10007;'}</div><div class="label">Verified</div></div>
            </div>

            <div class="section-card">
                <h3>Business Details</h3>
                <div class="detail-row"><span class="detail-label">Categories</span><span class="detail-value">${catTags}</span></div>
                <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escHtml(p.contact_email)}</span></div>
                ${p.contact_phone ? `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${escHtml(p.contact_phone)}</span></div>` : ''}
                ${p.website ? `<div class="detail-row"><span class="detail-label">Website</span><span class="detail-value"><a href="${escHtml(p.website)}" target="_blank">${escHtml(p.website)}</a></span></div>` : ''}
                ${p.years_established ? `<div class="detail-row"><span class="detail-label">Years Established</span><span class="detail-value">${p.years_established}</span></div>` : ''}
            </div>

            ${p.description ? `<div class="section-card"><h3>Description</h3><p style="color:#4A5E56;line-height:1.6;">${escHtml(p.description).replace(/\n/g, '<br>')}</p></div>` : ''}

            <div class="section-card">
                <h3>Coverage Area</h3>
                ${p.coverage_counties ? `<div class="detail-row"><span class="detail-label">Counties</span><span class="detail-value">${escHtml(p.coverage_counties)}</span></div>` : ''}
                ${p.coverage_postcodes ? `<div class="detail-row"><span class="detail-label">Postcodes</span><span class="detail-value">${escHtml(p.coverage_postcodes)}</span></div>` : ''}
                ${!p.coverage_counties && !p.coverage_postcodes ? '<p style="color:#8FA89E;">No coverage area set.</p>' : ''}
            </div>

            <div class="section-card">
                <h3>Reviews Received</h3>
                <div id="reviews-list" class="reviews-list"><p style="color:#8FA89E;">Loading...</p></div>
            </div>

            <div id="edit-section"></div>
        `;
    }

    function toggleEdit() {
        const section = document.getElementById('edit-section');
        if (section.classList.contains('active')) {
            section.classList.remove('active');
            section.innerHTML = '';
            return;
        }

        const p = providerData;
        const catCheckboxes = allCategories.map(c => {
            const checked = (p.categories || []).some(pc => pc.id === c.id) ? 'checked' : '';
            return `<span><input type="checkbox" id="edit-cat-${c.id}" value="${c.id}" ${checked}><label for="edit-cat-${c.id}">${escHtml(c.name)}</label></span>`;
        }).join('');

        section.innerHTML = `
            <div class="section-card">
                <h3>Edit Your Service</h3>
                <div id="edit-alert" class="alert" style="display:none;"></div>
                <form onsubmit="saveEdit(event)">
                    <div class="form-group"><label>Business Name *</label><input type="text" id="edit-name" value="${escHtml(p.business_name)}" required></div>
                    <div class="form-group"><label>Description *</label><textarea id="edit-desc" required>${escHtml(p.description)}</textarea></div>
                    <div class="form-group"><label>Categories *</label><div class="category-checkboxes">${catCheckboxes}</div></div>
                    <div class="form-row-2">
                        <div class="form-group"><label>Contact Email *</label><input type="email" id="edit-email" value="${escHtml(p.contact_email)}" required></div>
                        <div class="form-group"><label>Contact Phone</label><input type="tel" id="edit-phone" value="${escHtml(p.contact_phone || '')}"></div>
                    </div>
                    <div class="form-group"><label>Website</label><input type="url" id="edit-website" value="${escHtml(p.website || '')}"></div>
                    <div class="form-group"><label>Pricing Info</label><textarea id="edit-pricing">${escHtml(p.pricing_info || '')}</textarea></div>
                    <div class="form-group"><label>Years Established</label><input type="number" id="edit-years" min="0" value="${p.years_established || ''}"></div>
                    <div class="form-group"><label>Counties</label><input type="text" id="edit-counties" value="${escHtml(p.coverage_counties || '')}"><small>Comma-separated</small></div>
                    <div class="form-group"><label>Postcode Prefixes</label><input type="text" id="edit-postcodes" value="${escHtml(p.coverage_postcodes || '')}"><small>Comma-separated</small></div>
                    <div class="form-group"><label>Update Logo</label><input type="file" id="edit-logo" accept="image/*"></div>
                    <div style="display:flex; gap:0.5rem;">
                        <button type="submit" class="btn btn-primary" id="edit-submit-btn">Save Changes</button>
                        <button type="button" class="btn btn-secondary" onclick="toggleEdit()">Cancel</button>
                    </div>
                </form>
            </div>
        `;
        section.classList.add('active');
        section.scrollIntoView({ behavior: 'smooth' });
    }

    async function saveEdit(e) {
        e.preventDefault();
        const btn = document.getElementById('edit-submit-btn');
        const msgEl = document.getElementById('edit-alert');
        btn.disabled = true;
        btn.textContent = 'Saving...';
        msgEl.style.display = 'none';

        const selectedCats = [];
        document.querySelectorAll('.category-checkboxes input[type="checkbox"]:checked').forEach(cb => {
            selectedCats.push(parseInt(cb.value));
        });

        if (selectedCats.length === 0) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = 'Please select at least one category.';
            msgEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Save Changes';
            return;
        }

        const formData = new FormData();
        formData.append('business_name', document.getElementById('edit-name').value);
        formData.append('description', document.getElementById('edit-desc').value);
        formData.append('contact_email', document.getElementById('edit-email').value);
        formData.append('contact_phone', document.getElementById('edit-phone').value);
        formData.append('website', document.getElementById('edit-website').value);
        formData.append('coverage_counties', document.getElementById('edit-counties').value);
        formData.append('coverage_postcodes', document.getElementById('edit-postcodes').value);
        formData.append('pricing_info', document.getElementById('edit-pricing').value);
        const years = document.getElementById('edit-years').value;
        if (years) formData.append('years_established', years);
        selectedCats.forEach(id => formData.append('category_ids', id));

        const logoFile = document.getElementById('edit-logo').files[0];
        if (logoFile) formData.append('logo', logoFile);

        try {
            const headers = { 'X-CSRFToken': Auth.getCSRFToken() };
            const token = Auth.getToken();
            if (token) headers['Authorization'] = 'Token ' + token;

            const res = await fetch(`/api/service-providers/${providerData.id}/`, { method: 'PATCH', headers, body: formData });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || Object.values(data).flat().join(', '));
            }
            // Reload page
            window.location.reload();
        } catch (err) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = err.message || 'Failed to save.';
            msgEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Save Changes';
    }

    async function loadMyService() {
        try {
            const [catRes, svcRes] = await Promise.all([
                Auth.authFetch('/api/service-categories/', { headers: Auth.headers() }),
                Auth.authFetch('/api/service-providers/?mine=true', { headers: Auth.headers() }),
            ]);
            allCategories = await catRes.json();
            const data = await svcRes.json();
            const results = data.results || data;

            if (results.length === 0) {
                document.getElementById('my-service-content').innerHTML = `
                    <div class="empty-state">
                        <h3>You haven't registered a service yet</h3>
                        <p>Advertise your business to property buyers and sellers.</p>
                        <a href="/services/register/" class="btn btn-primary">Register Your Service</a>
                    </div>`;
                return;
            }

            providerData = results[0];
            // Fetch full detail
            const detailRes = await Auth.authFetch(`/api/service-providers/${providerData.id}/`, { headers: Auth.headers() });
            providerData = await detailRes.json();

            document.getElementById('my-service-content').innerHTML = renderViewMode(providerData);

            // Load reviews
            const revRes = await Auth.authFetch(`/api/service-providers/${providerData.id}/reviews/`, { headers: Auth.headers() });
            const reviews = await revRes.json();
            const revList = document.getElementById('reviews-list');
            if (reviews.length) {
                revList.innerHTML = reviews.map(renderReview).join('');
            } else {
                revList.innerHTML = '<p style="color:#8FA89E;">No reviews yet.</p>';
            }
        } catch (err) {
            document.getElementById('my-service-content').innerHTML =
                '<div class="alert alert-error">Failed to load your service. Please try again.</div>';
        }
    }

    loadMyService();
</script>
{% endblock %}
