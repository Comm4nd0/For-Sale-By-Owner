{% extends "base.html" %}

<meta property="og:description" id="og-desc" content="View this property on For Sale By Owner">

{% block extra_css %}
<style>
    .property-header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; }
    .property-header-left { flex: 1; }
    .property-price { font-size: 2rem; font-weight: 700; color: #19747E; }
    .property-title { font-size: 1.5rem; color: #115E66; margin-top: 0.25rem; }
    .property-type { color: #4A5C62; margin-top: 0.25rem; }
    .property-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    .save-btn { background: none; border: 2px solid #19747E; color: #19747E; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-family: inherit; display: flex; align-items: center; gap: 0.4rem; }
    .save-btn:hover { background: #D1E8E2; }
    .save-btn.saved { background: #19747E; color: white; }

    .share-btn, .print-btn { background: #E2E2E2; border: none; color: #115E66; padding: 0.5rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .share-btn:hover, .print-btn:hover { background: #8FA3A8; }

    .verified-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: #D1E8E2; color: #115E66; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }

    .carousel { position: relative; background: #D1E8E2; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
    .carousel img { width: 100%; height: 400px; object-fit: cover; display: none; cursor: pointer; }
    .carousel img.active { display: block; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(26,60,46,0.6); color: white; border: none; padding: 0.75rem 1rem; cursor: pointer; font-size: 1.2rem; border-radius: 4px; }
    .carousel-btn:hover { background: rgba(26,60,46,0.85); }
    .carousel-prev { left: 10px; }
    .carousel-next { right: 10px; }
    .carousel-thumbs { display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto; scrollbar-width: thin; }
    .carousel-thumbs::-webkit-scrollbar { height: 4px; }
    .carousel-thumbs::-webkit-scrollbar-thumb { background: #8FA3A8; border-radius: 2px; }
    .carousel-thumbs img { width: 64px; height: 48px; object-fit: cover; border-radius: 4px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s, border-color 0.2s; border: 2px solid transparent; flex-shrink: 0; display: block; height: 48px; }
    .carousel-thumbs img.active { opacity: 1; border-color: #115E66; }
    .carousel-thumbs img:hover { opacity: 0.85; }
    .no-image { height: 300px; display: flex; align-items: center; justify-content: center; color: #8FA3A8; font-size: 1.2rem; }

    .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .detail-section { margin-bottom: 1.5rem; }

    .detail-row { display: flex; justify-content: space-between; padding: 0.4rem 0; }
    .detail-label { color: #4A5C62; }

    .stat-value { font-size: 1.5rem; font-weight: 700; color: #115E66; }
    .stat-label { font-size: 0.85rem; color: #4A5C62; }

    /* EPC Rating Bar */
    .epc-bar { display: flex; gap: 2px; margin-top: 0.5rem; }
    .epc-segment { height: 28px; flex: 1; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.8rem; border-radius: 3px; opacity: 0.3; }
    .epc-segment.active { opacity: 1; transform: scaleY(1.15); }
    .epc-A { background: #008054; } .epc-B { background: #19b459; } .epc-C { background: #8dce46; }
    .epc-D { background: #ffd500; color: #333; } .epc-E { background: #fcaa65; color: #333; }
    .epc-F { background: #ef8023; } .epc-G { background: #e9153b; }

    /* Enquiry Form */
    .enquiry-form-section { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .enquiry-form-section h3 { color: #115E66; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .enquiry-form-section .form-group { margin-bottom: 0.75rem; }

    .enquiry-form-section input, .enquiry-form-section textarea { width: 100%; padding: 0.5rem; border: 1px solid #E2E2E2; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }

    /* Mortgage Calculator */

    .mortgage-section h3 { color: #115E66; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .mortgage-section .form-group { margin-bottom: 0.5rem; }

{% block extra_js %}
<script>
    // Support both /properties/123/ and /properties/slug-name/
    const pathParts = window.location.pathname.match(/\/properties\/([^/]+)/);
    const propertyIdOrSlug = pathParts ? pathParts[1] : null;
    if (!propertyIdOrSlug) window.location.href = '/';

    let currentSlide = 0;
    let images = [];
    let propertyData = null;

    function showSlide(n) {
        const imgs = document.querySelectorAll('.carousel > img');
        const thumbs = document.querySelectorAll('.carousel-thumbs img');
        if (!imgs.length) return;
        currentSlide = (n + imgs.length) % imgs.length;
        imgs.forEach(img => img.classList.remove('active'));
        thumbs.forEach(t => t.classList.remove('active'));
        imgs[currentSlide].classList.add('active');
        if (thumbs[currentSlide]) {
            thumbs[currentSlide].classList.add('active');
            thumbs[currentSlide].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    }

    let lightboxIndex = 0;

    function openLightbox(index) {
        if (!images.length) return;
        lightboxIndex = index;
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        const caption = document.getElementById('lightbox-caption');
        const counter = document.getElementById('lightbox-counter');
        img.src = images[index].image;
        img.alt = images[index].caption || '';
        caption.textContent = images[index].caption || '';
        counter.textContent = `${index + 1} / ${images.length}`;
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    function lightboxNav(delta) {
        if (!images.length) return;
        lightboxIndex = (lightboxIndex + delta + images.length) % images.length;
        const img = document.getElementById('lightbox-img');
        const caption = document.getElementById('lightbox-caption');
        const counter = document.getElementById('lightbox-counter');
        img.src = images[lightboxIndex].image;
        img.alt = images[lightboxIndex].caption || '';
        caption.textContent = images[lightboxIndex].caption || '';
        counter.textContent = `${lightboxIndex + 1} / ${images.length}`;
    }

    // Lightbox: click backdrop to close, keyboard nav
    document.addEventListener('click', function(e) {
        if (e.target.id === 'lightbox') closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
        const lb = document.getElementById('lightbox');
        if (!lb || !lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') lightboxNav(-1);

    function calculateMortgage() {
        const price = propertyData ? Number(propertyData.price) : 0;
        const deposit = Number(document.getElementById('mortgage-deposit')?.value || 0);
        const rate = Number(document.getElementById('mortgage-rate')?.value || 4.5);
        const term = Number(document.getElementById('mortgage-term')?.value || 25);
        const principal = price - deposit;
        if (principal <= 0 || rate <= 0 || term <= 0) return;
        const r = (rate / 100) / 12;
        const n = term * 12;
        const monthly = principal * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        const resultEl = document.getElementById('mortgage-result');
        if (resultEl) {
            resultEl.innerHTML = `<div class="amount">&pound;${Math.round(monthly).toLocaleString()}/mo</div><div class="label">Estimated monthly payment</div>`;
        }
    }

    function calculateStampDuty() {
        if (!propertyData) return;
        const price = Number(propertyData.price);
        const isFirst = document.getElementById('stamp-first-time')?.checked;
        const isAdditional = document.getElementById('stamp-additional')?.checked;

        let duty = 0;
        // England/NI rates (as of 2025)
        if (isFirst && price <= 625000) {
            // First-time buyer relief
            if (price <= 425000) {
                duty = 0;
            } else {
                duty = (price - 425000) * 0.05;
            }
        } else {
            const bands = [
                { limit: 250000, rate: 0 },
                { limit: 925000, rate: 0.05 },
                { limit: 1500000, rate: 0.10 },
                { limit: Infinity, rate: 0.12 },
            ];
            let remaining = price;
            let prev = 0;
            for (const band of bands) {
                const taxable = Math.min(remaining, band.limit - prev);
                duty += taxable * band.rate;
                remaining -= taxable;
                prev = band.limit;
                if (remaining <= 0) break;
            }
        }
        if (isAdditional) {
            duty += price * 0.05;
        }

        const el = document.getElementById('stamp-result');
        if (el) {
            const effectiveRate = price > 0 ? ((duty / price) * 100).toFixed(1) : 0;
            el.innerHTML = `<div class="amount">&pound;${Math.round(duty).toLocaleString()}</div><div class="label">Stamp Duty Land Tax (${effectiveRate}% effective rate)</div>`;
        }
    }

    async function uploadDocument(propertyId) {
        const fileInput = document.getElementById('doc-file');
        const msgEl = document.getElementById('doc-upload-msg');
        if (!fileInput.files.length) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = 'Please select a file.';
            msgEl.style.display = 'block';
            return;
        }
        msgEl.style.display = 'none';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('document_type', document.getElementById('doc-type').value);
        formData.append('is_public', document.getElementById('doc-public').checked);
        const title = document.getElementById('doc-title').value;
        if (title) formData.append('title', title);

        try {
            const token = Auth.getToken ? Auth.getToken() : localStorage.getItem('authToken');
            const res = await fetch(`/api/properties/${propertyId}/documents/`, {
                method: 'POST',
                headers: { 'Authorization': 'Token ' + token },
                body: formData,
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || Object.values(data).flat().join(', '));
            }
            loadDocuments(propertyId, true);
        } catch (err) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = err.message || 'Failed to upload document.';
            msgEl.style.display = 'block';
        }
    }

                            <h3>Address</h3>
                            <p>${p.address_line_1 ? escHtml(p.address_line_1) + '<br>' : ''}${escHtml(p.city)}</p>
                            ${!p.is_owner && !p.address_line_1 ? '<p style="color:#4A5C62; font-size:0.85rem;">Full address available from the seller</p>' : ''}
                        </div>
                        ${epcHtml}
                        ${p.floorplans && p.floorplans.length ? `
                        <div class="detail-section">
                            <h3>Floorplans</h3>
                            <div class="floorplan-gallery">
                                ${p.floorplans.map(fp => `
                                    <div class="floorplan-item" onclick="openFloorplan('${fp.file}')">
                                        <img src="${fp.file}" alt="${fp.title}" loading="lazy">
                                        <div class="floorplan-title">${fp.title}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>` : ''}
                        ${p.price_history && p.price_history.length > 1 ? `
                        <div class="detail-section">
                            <h3>Price History</h3>
                            <ul class="price-history-list">
                                ${p.price_history.map((ph, i) => {
                                    const prev = p.price_history[i + 1];
                                    let change = '';
                                    if (prev) {
                                        const diff = Number(ph.price) - Number(prev.price);
                                        if (diff > 0) change = `<span class="price-change-up">&uarr; +&pound;${Math.abs(diff).toLocaleString()}</span>`;
                                        else if (diff < 0) change = `<span class="price-change-down">&darr; -&pound;${Math.abs(diff).toLocaleString()}</span>`;
                                    }
                                    return `<li><span>&pound;${Number(ph.price).toLocaleString()} ${change}</span><span style="color:#4A5C62;">${new Date(ph.changed_at).toLocaleDateString()}</span></li>`;
                                }).join('')}
                            </ul>
                        </div>` : ''}
                        ${mapHtml}
                        <div id="neighbourhood-info"></div>
                        <div id="documents-section"></div>
                    </div>
                    <div>
                        <div class="detail-section">
                            <h3>Details</h3>
                            <div class="detail-row"><span class="detail-label">Listed by</span><span class="detail-value">${escHtml(p.owner_name)} ${p.owner_is_verified ? '&#10003;' : ''}</span></div>
                            <div class="detail-row"><span class="detail-label">Property type</span><span class="detail-value">${p.property_type_display}</span></div>
                            <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${p.status_display}</span></div>
                            ${p.epc_rating ? `<div class="detail-row"><span class="detail-label">EPC Rating</span><span class="detail-value">${p.epc_rating}</span></div>` : ''}
                            <div class="detail-row"><span class="detail-label">Views</span><span class="detail-value">${p.view_count || 0}</span></div>
                            <div class="detail-row"><span class="detail-label">Listed</span><span class="detail-value">${new Date(p.created_at).toLocaleDateString()}</span></div>
                        </div>
                        ${enquiryFormHtml}
                        <div id="viewing-request-section"></div>
                        <div id="offer-section"></div>
                        <div id="quick-actions-section"></div>
                        <div id="available-slots-section"></div>
                        ${mortgageHtml}
                        <div class="stamp-duty-section">
                            <h3>Stamp Duty Calculator</h3>
                            <div class="stamp-options">
                                <label><input type="radio" name="stamp-buyer-type" id="stamp-standard" onchange="calculateStampDuty()" checked> Standard</label>
                                <label><input type="radio" name="stamp-buyer-type" id="stamp-first-time" onchange="calculateStampDuty()"> First-time buyer</label>
                                <label><input type="radio" name="stamp-buyer-type" id="stamp-additional" onchange="calculateStampDuty()"> Additional property</label>
                            </div>
                            <div class="stamp-result" id="stamp-result"></div>
                        </div>
                    </div>
                </div>
                <div id="report-modal" class="report-modal" onclick="if(event.target===this)this.classList.remove('active')">
                    <div class="report-modal-content">
                        <h3>Report This Property</h3>
                        <div id="report-msg" class="alert" style="display:none;"></div>
                        <form onsubmit="submitReport(event, ${p.id})">
                            <div class="form-group">
                                <label>Reason</label>
                                <select id="report-reason" required>
                                    <option value="">Select a reason...</option>
                                    <option value="spam">Spam / Scam</option>
                                    <option value="inappropriate">Inappropriate Content</option>
                                    <option value="inaccurate">Inaccurate Information</option>
                                    <option value="duplicate">Duplicate Listing</option>
                                    <option value="sold">Already Sold</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Additional Details (optional)</label>
                                <textarea id="report-description" placeholder="Provide more context..."></textarea>
                            </div>
                            <div class="report-modal-actions">
                                <button type="button" class="btn btn-secondary" onclick="document.getElementById('report-modal').classList.remove('active')">Cancel</button>
                                <button type="submit" class="btn btn-danger" id="report-submit-btn">Submit Report</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div id="floorplan-modal" class="floorplan-modal" onclick="this.classList.remove('active')"><img src="" alt="Floorplan"></div>
                <div class="lightbox" id="lightbox">
                    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
                    <button class="lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
                    <button class="lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
                    <img id="lightbox-img" src="" alt="">
                    <div class="lightbox-caption" id="lightbox-caption"></div>
                    <div class="lightbox-counter" id="lightbox-counter"></div>
                </div>
                <div id="owner-actions"></div>
                <div id="local-services" class="local-services-section"></div>
                <div id="similar-properties" class="similar-section"></div>
                <div id="recently-viewed" class="recently-viewed"></div>
            `;

            // Auto-calc mortgage and stamp duty on load
            calculateMortgage();
            calculateStampDuty();

            // Show edit button if owner + offer/chat/slots for buyers
            if (Auth.isLoggedIn()) {
                Auth.authFetch('/auth/users/me/')
                    .then(r => r.json())
                    .then(user => {
                        const isOwner = user.id === p.owner;

                        if (isOwner) {
                            // Hide report button for owners
                            const reportBtn = document.getElementById('report-btn');
                            if (reportBtn) reportBtn.style.display = 'none';
                            document.getElementById('owner-actions').innerHTML = `
                                <div class="owner-actions">
                                    <a href="/properties/${p.id}/edit/" class="btn btn-secondary">Edit Property</a>
                                    <a href="/properties/${p.id}/viewing-slots/" class="btn btn-secondary" style="margin-left:0.5rem;">Manage Viewing Slots</a>
                                    <a href="/offers/" class="btn btn-secondary" style="margin-left:0.5rem;">View Offers</a>
                                </div>`;
                        } else {
                            // Show report button for non-owners
                            const reportBtn = document.getElementById('report-btn');
                            if (reportBtn) reportBtn.style.display = '';

                            // Make an Offer form for non-owners
                            document.getElementById('offer-section').innerHTML = `
                                <div class="offer-form-section">
                                    <h3>Make an Offer</h3>
                                    <div id="offer-msg" class="alert" style="display:none;"></div>
                                    <form onsubmit="submitOffer(event, ${p.id})">
                                        <div class="form-group">
                                            <label>Offer Amount (&pound;)</label>
                                            <input type="number" id="offer-amount" min="1" step="1" placeholder="Enter your offer" required>
                                        </div>
                                        <div class="form-group">
                                            <label>Message (optional)</label>
                                            <textarea id="offer-message" placeholder="Add a message to the seller..."></textarea>
                                        </div>
                                        <div class="form-group" style="margin-bottom:0.5rem;">
                                            <label class="offer-checkbox"><input type="checkbox" id="offer-cash-buyer"> Cash buyer</label>
                                            <label class="offer-checkbox"><input type="checkbox" id="offer-chain-free"> Chain free</label>
                                            <label class="offer-checkbox"><input type="checkbox" id="offer-mortgage-agreed"> Mortgage agreed in principle</label>
                                        </div>
                                        <button type="submit" class="btn btn-primary" id="offer-submit-btn" style="width:100%;">Submit Offer</button>
                                    </form>
                                </div>`;

                            // Quick actions for non-owners
                            document.getElementById('quick-actions-section').innerHTML = `
                                <div class="quick-actions">
                                    <h3>Quick Actions</h3>
                                    <button class="btn btn-primary" onclick="startChat(${p.id})">Message Seller</button>
                                    <a href="/offers/" class="btn btn-secondary">View My Offers</a>
                                </div>`;

                            // Load available viewing slots for buyers
                            Auth.authFetch('/api/properties/' + p.id + '/viewing-slots/', { headers: Auth.headers() })
                                .then(r => r.json())
                                .then(slots => {
                                    const slotList = Array.isArray(slots) ? slots : (slots.results || []);
                                    const available = slotList.filter(s => s.is_available !== false && (s.current_bookings || 0) < s.max_bookings);
                                    if (slotList.length > 0) {
                                        // Seller has created viewing slots — show slot booking UI
                                        if (available.length) {
                                            const el = document.getElementById('available-slots-section');
                                            el.innerHTML = '<div class="avail-slots-section"><h3>Available Viewing Times</h3>' +
                                                available.map(s => {
                                                    const dateStr = s.date
                                                        ? new Date(s.date + 'T00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })
                                                        : (s.day_display || 'Recurring');
                                                    return '<div class="avail-slot-item"><div><div class="avail-slot-date">' + escHtml(dateStr) + '</div><div class="avail-slot-time">' + escHtml(s.start_time) + ' - ' + escHtml(s.end_time) + '</div></div><button class="btn btn-primary" style="font-size:0.8rem;padding:0.3rem 0.75rem;" onclick="bookViewingSlot(' + p.id + ',' + s.id + ')">Book</button></div>';
                                                }).join('') +
                                                '<a href="/properties/' + p.id + '/viewing-slots/" style="display:inline-block;margin-top:0.5rem;color:#19747E;font-size:0.85rem;">View all slots &rarr;</a></div>';
                                        }
                                    } else {
                                        // No viewing slots — show viewing request form
                                        document.getElementById('viewing-request-section').innerHTML = `
                                            <div class="viewing-form-section">
                                                <h3>Request a Viewing</h3>
                                                <div id="viewing-msg" class="alert" style="display:none;"></div>
                                                <form onsubmit="submitViewing(event, ${p.id})">
                                                    <div class="form-group"><label>Phone (optional, kept private)</label><input type="tel" id="view-phone"></div>
                                                    <div class="form-row-2">
                                                        <div class="form-group"><label>Preferred Date</label><input type="date" id="view-date" required></div>
                                                        <div class="form-group"><label>Preferred Time</label><input type="time" id="view-time" required></div>
                                                    </div>
                                                    <div class="form-row-2">
                                                        <div class="form-group"><label>Alternative Date</label><input type="date" id="view-alt-date"></div>
                                                        <div class="form-group"><label>Alternative Time</label><input type="time" id="view-alt-time"></div>
                                                    </div>
                                                    <div class="form-group"><label>Message (optional)</label><textarea id="view-message"></textarea></div>
                                                    <button type="submit" class="btn btn-primary" style="width:100%;">Request Viewing</button>
                                                </form>
                                            </div>`;
                                    }
                                }).catch(() => {});
                        }

                        // Pre-fill enquiry and viewing forms
                        const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
                        const nameEl = document.getElementById('enq-name');
                        const emailEl = document.getElementById('enq-email');
                        if (nameEl && !nameEl.value) nameEl.value = fullName;
                        if (emailEl && !emailEl.value) emailEl.value = user.email;
                        const viewNameEl = document.getElementById('view-name');
                        const viewEmailEl = document.getElementById('view-email');
                        if (viewNameEl && !viewNameEl.value) viewNameEl.value = fullName;
                        if (viewEmailEl && !viewEmailEl.value) viewEmailEl.value = user.email;

                        // Load documents (owner gets upload form)
                        loadDocuments(p.id, isOwner);
                    }).catch(() => {
                        // Not logged in or error — load public documents only
                        loadDocuments(p.id, false);
                    });
            } else {
                // Not logged in — load public documents only
                loadDocuments(p.id, false);
            }

            // Load neighbourhood info (public, no auth needed)
            loadNeighbourhoodInfo(p.id);

            // Load local services for this property
            Auth.authFetch(`/api/properties/${p.id}/services/`, { headers: Auth.headers() })
                .then(r => r.json())
                .then(services => {
                    if (!services.length) return;
                    const el = document.getElementById('local-services');
                    el.innerHTML = `<h3>Local Services</h3>
                        <div class="services-scroll">${services.map(s => {
                            const url = s.slug ? `/services/${s.slug}/` : `/services/${s.id}/`;
                            const cats = (s.categories || []).map(c => c.name).join(', ');
                            const rating = s.average_rating ? `${'&#9733;'.repeat(Math.floor(s.average_rating))} ${s.average_rating.toFixed(1)}` : '';
                            return `<a href="${url}" class="service-mini-card"><div class="service-mini-body">
                                <div class="service-mini-name">${escHtml(s.business_name)}${s.is_verified ? ' &#10003;' : ''}</div>
                                <div class="service-mini-cat">${escHtml(cats)}</div>
                                ${rating ? `<div class="service-mini-rating">${rating}</div>` : ''}
                            </div></a>`;
                        }).join('')}</div>
                        <a href="/services/" style="display:inline-block;margin-top:0.75rem;color:#19747E;font-size:0.9rem;">Browse all services &rarr;</a>`;
                }).catch(() => {});

            // Load similar properties
            Auth.authFetch(`/api/properties/${p.id}/similar/`, { headers: Auth.headers() })
                .then(r => r.json())
                .then(similar => {
                    if (!similar.length) return;
                    const el = document.getElementById('similar-properties');
                    el.innerHTML = `<h3>Similar Properties</h3><div class="similar-grid">${similar.map(s => {
                        const url = s.slug ? `/properties/${s.slug}/` : `/properties/${s.id}/`;
                        const img = s.primary_image
                            ? `<img src="${s.primary_image}" alt="${s.title}">`
                            : `<div class="placeholder">&#8962;</div>`;
                        return `<a href="${url}" class="similar-card">${img}<div class="similar-card-body"><h4>${s.title}</h4><div class="price">&pound;${Number(s.price).toLocaleString()}</div><div class="meta">${s.bedrooms} bed &bull; ${s.city}</div></div></a>`;
                    }).join('')}</div>`;
                }).catch(() => {});

            // Show recently viewed (excluding current)
            const recent = RecentlyViewed.get().filter(r => r.id !== p.id);
            if (recent.length > 0) {
                document.getElementById('recently-viewed').innerHTML = `<h3>Recently Viewed</h3><div class="similar-grid">${recent.slice(0, 4).map(r => {
                    const url = r.slug ? `/properties/${r.slug}/` : `/properties/${r.id}/`;
                    const img = r.primary_image
                        ? `<img src="${r.primary_image}" alt="${r.title}">`
                        : `<div class="placeholder">&#8962;</div>`;
                    return `<a href="${url}" class="similar-card">${img}<div class="similar-card-body"><h4>${r.title}</h4><div class="price">&pound;${Number(r.price).toLocaleString()}</div><div class="meta">${r.bedrooms || 0} bed &bull; ${r.city || ''}</div></div></a>`;
                }).join('')}</div>`;
            }
        })
        .catch(() => {
            document.getElementById('property-content').innerHTML = '<div class="alert alert-error">Property not found.</div>';
        });
</script>
{% endblock %}
