{% extends "base.html" %}

{% block title %}Property Details - For Sale By Owner{% endblock %}

{% block meta_tags %}
<meta property="og:site_name" content="For Sale By Owner">
<meta property="og:type" content="website">
<meta property="og:title" id="og-title" content="Property Details - For Sale By Owner">
<meta property="og:description" id="og-desc" content="View this property on For Sale By Owner">
<meta property="og:image" id="og-image" content="">
{% endblock %}

{% block extra_css %}
<style>
    .property-header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; }
    .property-header-left { flex: 1; }
    .property-price { font-size: 2rem; font-weight: 700; color: #C9872A; }
    .property-title { font-size: 1.5rem; color: #1A3C2E; margin-top: 0.25rem; }
    .property-type { color: #4A5E56; margin-top: 0.25rem; }
    .property-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    .save-btn { background: none; border: 2px solid #2D6A4F; color: #2D6A4F; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-family: inherit; display: flex; align-items: center; gap: 0.4rem; }
    .save-btn:hover { background: #D8F3DC; }
    .save-btn.saved { background: #2D6A4F; color: white; }

    .share-btn, .print-btn { background: #D4DDD9; border: none; color: #1A3C2E; padding: 0.5rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .share-btn:hover, .print-btn:hover { background: #8FA89E; }

    .verified-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: #D8F3DC; color: #1A3C2E; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }

    .carousel { position: relative; background: #D8F3DC; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
    .carousel img { width: 100%; height: 400px; object-fit: cover; display: none; cursor: pointer; }
    .carousel img.active { display: block; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(26,60,46,0.6); color: white; border: none; padding: 0.75rem 1rem; cursor: pointer; font-size: 1.2rem; border-radius: 4px; }
    .carousel-btn:hover { background: rgba(26,60,46,0.85); }
    .carousel-prev { left: 10px; }
    .carousel-next { right: 10px; }
    .carousel-dots { text-align: center; padding: 0.75rem; }
    .carousel-dots span { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #D4DDD9; margin: 0 4px; cursor: pointer; }
    .carousel-dots span.active { background: #1A3C2E; }
    .no-image { height: 300px; display: flex; align-items: center; justify-content: center; color: #8FA89E; font-size: 1.2rem; }

    .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .detail-section { margin-bottom: 1.5rem; }
    .detail-section h3 { color: #1A3C2E; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #D4DDD9; }
    .detail-row { display: flex; justify-content: space-between; padding: 0.4rem 0; }
    .detail-label { color: #4A5E56; }
    .detail-value { font-weight: 500; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { text-align: center; padding: 1rem; background: #FFFFFF; border-radius: 8px; border: 1px solid #D4DDD9; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #1A3C2E; }
    .stat-label { font-size: 0.85rem; color: #4A5E56; }

    /* EPC Rating Bar */
    .epc-bar { display: flex; gap: 2px; margin-top: 0.5rem; }
    .epc-segment { height: 28px; flex: 1; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.8rem; border-radius: 3px; opacity: 0.3; }
    .epc-segment.active { opacity: 1; transform: scaleY(1.15); }
    .epc-A { background: #008054; } .epc-B { background: #19b459; } .epc-C { background: #8dce46; }
    .epc-D { background: #ffd500; color: #333; } .epc-E { background: #fcaa65; color: #333; }
    .epc-F { background: #ef8023; } .epc-G { background: #e9153b; }

    /* Enquiry Form */
    .enquiry-form-section { background: #FFFFFF; border: 1px solid #D4DDD9; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .enquiry-form-section h3 { color: #1A3C2E; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .enquiry-form-section .form-group { margin-bottom: 0.75rem; }
    .enquiry-form-section label { display: block; margin-bottom: 0.2rem; font-size: 0.85rem; font-weight: 500; color: #4A5E56; }
    .enquiry-form-section input, .enquiry-form-section textarea { width: 100%; padding: 0.5rem; border: 1px solid #D4DDD9; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
    .enquiry-form-section textarea { min-height: 80px; resize: vertical; }

    /* Mortgage Calculator */
    .mortgage-section { background: #FFFFFF; border: 1px solid #D4DDD9; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .mortgage-section h3 { color: #1A3C2E; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .mortgage-section .form-group { margin-bottom: 0.5rem; }
    .mortgage-section label { display: block; margin-bottom: 0.2rem; font-size: 0.85rem; font-weight: 500; color: #4A5E56; }
    .mortgage-section input { width: 100%; padding: 0.5rem; border: 1px solid #D4DDD9; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
    .mortgage-result { margin-top: 0.75rem; background: #D8F3DC; padding: 0.75rem; border-radius: 6px; text-align: center; }
    .mortgage-result .amount { font-size: 1.4rem; font-weight: 700; color: #1A3C2E; }
    .mortgage-result .label { font-size: 0.8rem; color: #4A5E56; }

    /* Map placeholder */
    .map-container { border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; background: #D8F3DC; min-height: 250px; }
    .map-container iframe { width: 100%; height: 250px; border: none; }

    /* Similar Properties */
    .similar-section { margin-top: 2rem; }
    .similar-section h3 { color: #1A3C2E; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #D4DDD9; }
    .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .similar-card { border: 1px solid #D4DDD9; border-radius: 8px; overflow: hidden; text-decoration: none; color: inherit; display: block; background: #FFFFFF; }
    .similar-card:hover { box-shadow: 0 4px 12px rgba(26,60,46,0.12); }
    .similar-card img { width: 100%; height: 150px; object-fit: cover; }
    .similar-card .placeholder { width: 100%; height: 150px; background: #D8F3DC; display: flex; align-items: center; justify-content: center; color: #8FA89E; font-size: 2rem; }
    .similar-card-body { padding: 0.75rem; }
    .similar-card-body h4 { font-size: 0.95rem; color: #1A3C2E; margin-bottom: 0.2rem; }
    .similar-card-body .price { font-weight: 700; color: #C9872A; }
    .similar-card-body .meta { font-size: 0.8rem; color: #4A5E56; }

    /* Recently Viewed */
    .recently-viewed { margin-top: 2rem; }
    .recently-viewed h3 { color: #1A3C2E; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #D4DDD9; }

    /* Features tags */
    .features-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .feature-tag { background: #D8F3DC; color: #1A3C2E; padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.3rem; }

    /* Floorplans */
    .floorplan-gallery { display: grid; gap: 1rem; }
    .floorplan-item { border: 1px solid #D4DDD9; border-radius: 8px; overflow: hidden; cursor: pointer; }
    .floorplan-item img { width: 100%; height: auto; display: block; }
    .floorplan-item .floorplan-title { padding: 0.5rem 0.75rem; font-size: 0.9rem; color: #4A5E56; background: #F6F9F7; }
    .floorplan-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; cursor: pointer; }
    .floorplan-modal.active { display: flex; }
    .floorplan-modal img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

    /* Image Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10001; align-items: center; justify-content: center; flex-direction: column; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 4px; }
    .lightbox-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: white; font-size: 2.5rem; cursor: pointer; line-height: 1; padding: 0.25rem 0.5rem; z-index: 10002; opacity: 0.8; }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: white; font-size: 2.5rem; cursor: pointer; padding: 0.75rem 1rem; border-radius: 6px; z-index: 10002; opacity: 0.7; }
    .lightbox-prev:hover, .lightbox-next:hover { opacity: 1; background: rgba(255,255,255,0.25); }
    .lightbox-prev { left: 1rem; }
    .lightbox-next { right: 1rem; }
    .lightbox-caption { color: white; text-align: center; margin-top: 1rem; font-size: 0.9rem; opacity: 0.85; }
    .lightbox-counter { color: white; text-align: center; margin-top: 0.35rem; font-size: 0.8rem; opacity: 0.6; }
    @media (max-width: 768px) {
        .lightbox-prev, .lightbox-next { font-size: 2rem; padding: 1rem 0.75rem; }
        .lightbox-close { font-size: 2rem; top: 0.5rem; right: 1rem; }
    }

    /* Price History */
    .price-history-list { list-style: none; padding: 0; }
    .price-history-list li { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .price-history-list li:last-child { border-bottom: none; }
    .price-change-up { color: #B03A2E; }
    .price-change-down { color: #2D6A4F; }

    /* Stamp Duty Calculator */
    .stamp-duty-section { background: #FFFFFF; border: 1px solid #D4DDD9; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .stamp-duty-section h3 { color: #1A3C2E; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .stamp-result { margin-top: 0.5rem; background: #D8F3DC; padding: 0.75rem; border-radius: 6px; }
    .stamp-result .amount { font-size: 1.2rem; font-weight: 700; color: #1A3C2E; }
    .stamp-result .label { font-size: 0.8rem; color: #4A5E56; }
    .stamp-options { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .stamp-options label { font-size: 0.85rem; display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }

    /* Viewing Request Form */
    .viewing-form-section { background: #FFFFFF; border: 1px solid #D4DDD9; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .viewing-form-section h3 { color: #1A3C2E; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .viewing-form-section .form-group { margin-bottom: 0.75rem; }
    .viewing-form-section label { display: block; margin-bottom: 0.2rem; font-size: 0.85rem; font-weight: 500; color: #4A5E56; }
    .viewing-form-section input, .viewing-form-section textarea { width: 100%; padding: 0.5rem; border: 1px solid #D4DDD9; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
    .viewing-form-section textarea { min-height: 60px; resize: vertical; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .owner-actions { margin-top: 1rem; display: flex; gap: 0.75rem; }
    @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } .property-header { flex-direction: column; } }
</style>
{% endblock %}

{% block content %}
<div id="property-content">
    <p>Loading property...</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Support both /properties/123/ and /properties/slug-name/
    const pathParts = window.location.pathname.match(/\/properties\/([^/]+)/);
    const propertyIdOrSlug = pathParts ? pathParts[1] : null;
    if (!propertyIdOrSlug) window.location.href = '/';

    let currentSlide = 0;
    let images = [];
    let propertyData = null;

    function showSlide(n) {
        const imgs = document.querySelectorAll('.carousel img');
        const dots = document.querySelectorAll('.carousel-dots span');
        if (!imgs.length) return;
        currentSlide = (n + imgs.length) % imgs.length;
        imgs.forEach(img => img.classList.remove('active'));
        dots.forEach(dot => dot.classList.remove('active'));
        imgs[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
    }

    let lightboxIndex = 0;

    function openLightbox(index) {
        if (!images.length) return;
        lightboxIndex = index;
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        const caption = document.getElementById('lightbox-caption');
        const counter = document.getElementById('lightbox-counter');
        img.src = images[index].image;
        img.alt = images[index].caption || '';
        caption.textContent = images[index].caption || '';
        counter.textContent = `${index + 1} / ${images.length}`;
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    function lightboxNav(delta) {
        if (!images.length) return;
        lightboxIndex = (lightboxIndex + delta + images.length) % images.length;
        const img = document.getElementById('lightbox-img');
        const caption = document.getElementById('lightbox-caption');
        const counter = document.getElementById('lightbox-counter');
        img.src = images[lightboxIndex].image;
        img.alt = images[lightboxIndex].caption || '';
        caption.textContent = images[lightboxIndex].caption || '';
        counter.textContent = `${lightboxIndex + 1} / ${images.length}`;
    }

    // Lightbox: click backdrop to close, keyboard nav
    document.addEventListener('click', function(e) {
        if (e.target.id === 'lightbox') closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
        const lb = document.getElementById('lightbox');
        if (!lb || !lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') lightboxNav(-1);
        else if (e.key === 'ArrowRight') lightboxNav(1);
    });

    function buildEPCBar(rating) {
        if (!rating) return '';
        const ratings = ['A','B','C','D','E','F','G'];
        return `<div class="epc-bar">${ratings.map(r =>
            `<div class="epc-segment epc-${r} ${r === rating ? 'active' : ''}">${r}</div>`
        ).join('')}</div>`;
    }

    function calculateMortgage() {
        const price = propertyData ? Number(propertyData.price) : 0;
        const deposit = Number(document.getElementById('mortgage-deposit')?.value || 0);
        const rate = Number(document.getElementById('mortgage-rate')?.value || 4.5);
        const term = Number(document.getElementById('mortgage-term')?.value || 25);
        const principal = price - deposit;
        if (principal <= 0 || rate <= 0 || term <= 0) return;
        const r = (rate / 100) / 12;
        const n = term * 12;
        const monthly = principal * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        const resultEl = document.getElementById('mortgage-result');
        if (resultEl) {
            resultEl.innerHTML = `<div class="amount">&pound;${Math.round(monthly).toLocaleString()}/mo</div><div class="label">Estimated monthly payment</div>`;
        }
    }

    async function toggleSave(propertyId) {
        const btn = document.getElementById('save-btn');
        const isSaved = btn.classList.contains('saved');
        const method = isSaved ? 'DELETE' : 'POST';
        await fetch(`/api/properties/${propertyId}/save/`, { method, headers: Auth.headers(false) });
        btn.classList.toggle('saved');
        btn.innerHTML = btn.classList.contains('saved') ? '&#9829; Saved' : '&#9825; Save';
    }

    function calculateStampDuty() {
        if (!propertyData) return;
        const price = Number(propertyData.price);
        const isFirst = document.getElementById('stamp-first-time')?.checked;
        const isAdditional = document.getElementById('stamp-additional')?.checked;

        let duty = 0;
        // England/NI rates (as of 2025)
        if (isFirst && price <= 625000) {
            // First-time buyer relief
            if (price <= 425000) {
                duty = 0;
            } else {
                duty = (price - 425000) * 0.05;
            }
        } else {
            const bands = [
                { limit: 250000, rate: 0 },
                { limit: 925000, rate: 0.05 },
                { limit: 1500000, rate: 0.10 },
                { limit: Infinity, rate: 0.12 },
            ];
            let remaining = price;
            let prev = 0;
            for (const band of bands) {
                const taxable = Math.min(remaining, band.limit - prev);
                duty += taxable * band.rate;
                remaining -= taxable;
                prev = band.limit;
                if (remaining <= 0) break;
            }
        }
        if (isAdditional) {
            duty += price * 0.05;
        }

        const el = document.getElementById('stamp-result');
        if (el) {
            const effectiveRate = price > 0 ? ((duty / price) * 100).toFixed(1) : 0;
            el.innerHTML = `<div class="amount">&pound;${Math.round(duty).toLocaleString()}</div><div class="label">Stamp Duty Land Tax (${effectiveRate}% effective rate)</div>`;
        }
    }

    function openFloorplan(src) {
        const modal = document.getElementById('floorplan-modal');
        modal.querySelector('img').src = src;
        modal.classList.add('active');
    }

    async function submitViewing(e, propertyId) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const msgEl = document.getElementById('viewing-msg');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        msgEl.style.display = 'none';

        try {
            const body = {
                property: propertyId,
                name: document.getElementById('view-name').value,
                email: document.getElementById('view-email').value,
                phone: document.getElementById('view-phone').value,
                preferred_date: document.getElementById('view-date').value,
                preferred_time: document.getElementById('view-time').value,
                message: document.getElementById('view-message').value,
            };
            const altDate = document.getElementById('view-alt-date').value;
            const altTime = document.getElementById('view-alt-time').value;
            if (altDate) body.alternative_date = altDate;
            if (altTime) body.alternative_time = altTime;

            const res = await fetch('/api/viewings/', {
                method: 'POST',
                headers: Auth.headers(),
                body: JSON.stringify(body),
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || Object.values(data).flat().join(', '));
            }
            msgEl.className = 'alert alert-success';
            msgEl.textContent = 'Viewing request sent! The seller will respond soon.';
            msgEl.style.display = 'block';
            e.target.reset();
        } catch (err) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = err.message || 'Failed to send viewing request.';
            msgEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Request Viewing';
    }

    async function submitEnquiry(e, propertyId) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const msgEl = document.getElementById('enquiry-msg');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        msgEl.style.display = 'none';

        try {
            const res = await fetch('/api/enquiries/', {
                method: 'POST',
                headers: Auth.headers(),
                body: JSON.stringify({
                    property: propertyId,
                    name: document.getElementById('enq-name').value,
                    email: document.getElementById('enq-email').value,
                    phone: document.getElementById('enq-phone').value,
                    message: document.getElementById('enq-message').value,
                }),
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || Object.values(data).flat().join(', '));
            }
            msgEl.className = 'alert alert-success';
            msgEl.textContent = 'Enquiry sent! The seller will receive your message.';
            msgEl.style.display = 'block';
            e.target.reset();
        } catch (err) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = err.message || 'Failed to send enquiry.';
            msgEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Send Enquiry';
    }

    Auth.authFetch(`/api/properties/${propertyIdOrSlug}/`, { headers: Auth.headers() })
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(p => {
            propertyData = p;
            images = p.images || [];

            // Update page title and OG tags for social sharing
            document.title = `${p.title} - \u00A3${Number(p.price).toLocaleString()} - For Sale By Owner`;
            document.getElementById('og-title')?.setAttribute('content', `${p.title} - \u00A3${Number(p.price).toLocaleString()}`);
            document.getElementById('og-desc')?.setAttribute('content', `${p.bedrooms} bed ${p.property_type_display} in ${p.city} - ${p.address_line_1}`);
            if (p.primary_image) document.getElementById('og-image')?.setAttribute('content', window.location.origin + p.primary_image);

            // Track in recently viewed
            RecentlyViewed.add(p);

            const carouselHtml = images.length > 0
                ? `<div class="carousel">
                    ${images.map((img, i) => `<img src="${img.image}" alt="${img.caption || p.title}" class="${i === 0 ? 'active' : ''}" onclick="openLightbox(${i})">`).join('')}
                    ${images.length > 1 ? `
                        <button class="carousel-btn carousel-prev" onclick="showSlide(currentSlide - 1)">&lsaquo;</button>
                        <button class="carousel-btn carousel-next" onclick="showSlide(currentSlide + 1)">&rsaquo;</button>
                        <div class="carousel-dots">${images.map((_, i) => `<span class="${i === 0 ? 'active' : ''}" onclick="showSlide(${i})"></span>`).join('')}</div>
                    ` : ''}
                   </div>`
                : `<div class="carousel"><div class="no-image">No images available</div></div>`;

            const epcHtml = p.epc_rating ? `
                <div class="detail-section">
                    <h3>EPC Rating</h3>
                    ${buildEPCBar(p.epc_rating)}
                </div>` : '';

            const saveBtn = Auth.isLoggedIn() ? `
                <button class="save-btn ${p.is_saved ? 'saved' : ''}" id="save-btn" onclick="toggleSave(${p.id})">
                    ${p.is_saved ? '&#9829; Saved' : '&#9825; Save'}
                </button>` : '';

            const shareBtn = `<button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href).then(() => this.textContent='Copied!'); setTimeout(() => this.textContent='Share', 1500);">Share</button>`;
            const printBtn = `<button class="print-btn" onclick="window.print()">Print</button>`;

            const defaultDeposit = Math.round(Number(p.price) * 0.1);

            const enquiryFormHtml = Auth.isLoggedIn() ? `
                <div class="enquiry-form-section">
                    <h3>Contact Seller</h3>
                    <div id="enquiry-msg" class="alert" style="display:none;"></div>
                    <form onsubmit="submitEnquiry(event, ${p.id})">
                        <div class="form-group"><label>Your Name</label><input type="text" id="enq-name" required></div>
                        <div class="form-group"><label>Email (kept private)</label><input type="email" id="enq-email" required></div>
                        <div class="form-group"><label>Phone (optional, kept private)</label><input type="tel" id="enq-phone"></div>
                        <div class="form-group"><label>Message</label><textarea id="enq-message" required>I am interested in this property. Please contact me with more details.</textarea></div>
                        <button type="submit" class="btn btn-primary" style="width:100%;">Send Enquiry</button>
                    </form>
                </div>` : `
                <div class="enquiry-form-section">
                    <h3>Contact Seller</h3>
                    <p style="color:#4A5E56;"><a href="/login/?next=${encodeURIComponent(window.location.pathname)}">Log in</a> or <a href="/register/">register</a> to contact the seller.</p>
                </div>`;

            const mortgageHtml = `
                <div class="mortgage-section">
                    <h3>Mortgage Calculator</h3>
                    <div class="form-group"><label>Deposit (&pound;)</label><input type="number" id="mortgage-deposit" value="${defaultDeposit}" oninput="calculateMortgage()"></div>
                    <div class="form-group"><label>Interest Rate (%)</label><input type="number" id="mortgage-rate" value="4.5" step="0.1" oninput="calculateMortgage()"></div>
                    <div class="form-group"><label>Term (years)</label><input type="number" id="mortgage-term" value="25" oninput="calculateMortgage()"></div>
                    <div class="mortgage-result" id="mortgage-result"></div>
                </div>`;

            const mapHtml = `
                <div class="detail-section">
                    <h3>Location</h3>
                    <div class="map-container">
                        <iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                            src="https://maps.google.com/maps?q=${encodeURIComponent(p.postcode)}&t=&z=14&ie=UTF8&iwloc=&output=embed">
                        </iframe>
                    </div>
                </div>`;

            document.getElementById('property-content').innerHTML = `
                ${carouselHtml}
                <div class="property-header">
                    <div class="property-header-left">
                        <div class="property-price">&pound;${Number(p.price).toLocaleString()}</div>
                        <div class="property-title">${escHtml(p.title)}</div>
                        <div class="property-type">
                            ${p.property_type_display} &bull; ${p.status_display}
                            ${p.owner_is_verified ? '<span class="verified-badge">&#10003; Verified Seller</span>' : ''}
                        </div>
                    </div>
                    <div class="property-actions">
                        ${saveBtn}
                        ${shareBtn}
                        ${printBtn}
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-value">${p.bedrooms}</div><div class="stat-label">Bedrooms</div></div>
                    <div class="stat-box"><div class="stat-value">${p.bathrooms}</div><div class="stat-label">Bathrooms</div></div>
                    <div class="stat-box"><div class="stat-value">${p.reception_rooms}</div><div class="stat-label">Reception</div></div>
                    ${p.square_feet ? `<div class="stat-box"><div class="stat-value">${p.square_feet.toLocaleString()}</div><div class="stat-label">Sq Ft</div></div>` : ''}
                </div>
                <div class="detail-grid">
                    <div>
                        ${p.description ? `<div class="detail-section"><h3>Description</h3><p>${escHtml(p.description).replace(/\n/g, '<br>')}</p></div>` : ''}
                        ${p.feature_list && p.feature_list.length ? `
                        <div class="detail-section">
                            <h3>Features</h3>
                            <div class="features-list">
                                ${p.feature_list.map(f => `<span class="feature-tag">${f.icon ? escHtml(f.icon) + ' ' : ''}${escHtml(f.name)}</span>`).join('')}
                            </div>
                        </div>` : ''}
                        <div class="detail-section">
                            <h3>Address</h3>
                            <p>${escHtml(p.address_line_1)}${p.address_line_2 ? ', ' + escHtml(p.address_line_2) : ''}<br>
                            ${escHtml(p.city)}${p.county ? ', ' + escHtml(p.county) : ''}<br>${escHtml(p.postcode)}</p>
                        </div>
                        ${epcHtml}
                        ${p.floorplans && p.floorplans.length ? `
                        <div class="detail-section">
                            <h3>Floorplans</h3>
                            <div class="floorplan-gallery">
                                ${p.floorplans.map(fp => `
                                    <div class="floorplan-item" onclick="openFloorplan('${fp.file}')">
                                        <img src="${fp.file}" alt="${fp.title}" loading="lazy">
                                        <div class="floorplan-title">${fp.title}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>` : ''}
                        ${p.price_history && p.price_history.length > 1 ? `
                        <div class="detail-section">
                            <h3>Price History</h3>
                            <ul class="price-history-list">
                                ${p.price_history.map((ph, i) => {
                                    const prev = p.price_history[i + 1];
                                    let change = '';
                                    if (prev) {
                                        const diff = Number(ph.price) - Number(prev.price);
                                        if (diff > 0) change = `<span class="price-change-up">&uarr; +&pound;${Math.abs(diff).toLocaleString()}</span>`;
                                        else if (diff < 0) change = `<span class="price-change-down">&darr; -&pound;${Math.abs(diff).toLocaleString()}</span>`;
                                    }
                                    return `<li><span>&pound;${Number(ph.price).toLocaleString()} ${change}</span><span style="color:#4A5E56;">${new Date(ph.changed_at).toLocaleDateString()}</span></li>`;
                                }).join('')}
                            </ul>
                        </div>` : ''}
                        ${mapHtml}
                    </div>
                    <div>
                        <div class="detail-section">
                            <h3>Details</h3>
                            <div class="detail-row"><span class="detail-label">Listed by</span><span class="detail-value">${escHtml(p.owner_name)} ${p.owner_is_verified ? '&#10003;' : ''}</span></div>
                            <div class="detail-row"><span class="detail-label">Property type</span><span class="detail-value">${p.property_type_display}</span></div>
                            <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">${p.status_display}</span></div>
                            ${p.epc_rating ? `<div class="detail-row"><span class="detail-label">EPC Rating</span><span class="detail-value">${p.epc_rating}</span></div>` : ''}
                            <div class="detail-row"><span class="detail-label">Views</span><span class="detail-value">${p.view_count || 0}</span></div>
                            <div class="detail-row"><span class="detail-label">Listed</span><span class="detail-value">${new Date(p.created_at).toLocaleDateString()}</span></div>
                        </div>
                        ${enquiryFormHtml}
                        ${Auth.isLoggedIn() ? `
                        <div class="viewing-form-section">
                            <h3>Request a Viewing</h3>
                            <div id="viewing-msg" class="alert" style="display:none;"></div>
                            <form onsubmit="submitViewing(event, ${p.id})">
                                <div class="form-group"><label>Your Name</label><input type="text" id="view-name" required></div>
                                <div class="form-group"><label>Email (kept private)</label><input type="email" id="view-email" required></div>
                                <div class="form-group"><label>Phone (optional, kept private)</label><input type="tel" id="view-phone"></div>
                                <div class="form-row-2">
                                    <div class="form-group"><label>Preferred Date</label><input type="date" id="view-date" required></div>
                                    <div class="form-group"><label>Preferred Time</label><input type="time" id="view-time" required></div>
                                </div>
                                <div class="form-row-2">
                                    <div class="form-group"><label>Alternative Date</label><input type="date" id="view-alt-date"></div>
                                    <div class="form-group"><label>Alternative Time</label><input type="time" id="view-alt-time"></div>
                                </div>
                                <div class="form-group"><label>Message (optional)</label><textarea id="view-message"></textarea></div>
                                <button type="submit" class="btn btn-primary" style="width:100%;">Request Viewing</button>
                            </form>
                        </div>` : ''}
                        ${mortgageHtml}
                        <div class="stamp-duty-section">
                            <h3>Stamp Duty Calculator</h3>
                            <div class="stamp-options">
                                <label><input type="radio" name="stamp-buyer-type" id="stamp-standard" onchange="calculateStampDuty()" checked> Standard</label>
                                <label><input type="radio" name="stamp-buyer-type" id="stamp-first-time" onchange="calculateStampDuty()"> First-time buyer</label>
                                <label><input type="radio" name="stamp-buyer-type" id="stamp-additional" onchange="calculateStampDuty()"> Additional property</label>
                            </div>
                            <div class="stamp-result" id="stamp-result"></div>
                        </div>
                    </div>
                </div>
                <div id="floorplan-modal" class="floorplan-modal" onclick="this.classList.remove('active')"><img src="" alt="Floorplan"></div>
                <div class="lightbox" id="lightbox">
                    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
                    <button class="lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
                    <button class="lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
                    <img id="lightbox-img" src="" alt="">
                    <div class="lightbox-caption" id="lightbox-caption"></div>
                    <div class="lightbox-counter" id="lightbox-counter"></div>
                </div>
                <div id="owner-actions"></div>
                <div id="similar-properties" class="similar-section"></div>
                <div id="recently-viewed" class="recently-viewed"></div>
            `;

            // Auto-calc mortgage and stamp duty on load
            calculateMortgage();
            calculateStampDuty();

            // Show edit button if owner
            if (Auth.isLoggedIn()) {
                fetch('/auth/users/me/', { headers: Auth.headers() })
                    .then(r => r.json())
                    .then(user => {
                        if (user.id === p.owner) {
                            document.getElementById('owner-actions').innerHTML = `
                                <div class="owner-actions">
                                    <a href="/properties/${p.id}/edit/" class="btn btn-secondary">Edit Property</a>
                                </div>`;
                        }
                        // Pre-fill enquiry and viewing forms
                        const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
                        const nameEl = document.getElementById('enq-name');
                        const emailEl = document.getElementById('enq-email');
                        if (nameEl && !nameEl.value) nameEl.value = fullName;
                        if (emailEl && !emailEl.value) emailEl.value = user.email;
                        const viewNameEl = document.getElementById('view-name');
                        const viewEmailEl = document.getElementById('view-email');
                        if (viewNameEl && !viewNameEl.value) viewNameEl.value = fullName;
                        if (viewEmailEl && !viewEmailEl.value) viewEmailEl.value = user.email;
                    }).catch(() => {});
            }

            // Load similar properties
            Auth.authFetch(`/api/properties/${p.id}/similar/`, { headers: Auth.headers() })
                .then(r => r.json())
                .then(similar => {
                    if (!similar.length) return;
                    const el = document.getElementById('similar-properties');
                    el.innerHTML = `<h3>Similar Properties</h3><div class="similar-grid">${similar.map(s => {
                        const url = s.slug ? `/properties/${s.slug}/` : `/properties/${s.id}/`;
                        const img = s.primary_image
                            ? `<img src="${s.primary_image}" alt="${s.title}">`
                            : `<div class="placeholder">&#8962;</div>`;
                        return `<a href="${url}" class="similar-card">${img}<div class="similar-card-body"><h4>${s.title}</h4><div class="price">&pound;${Number(s.price).toLocaleString()}</div><div class="meta">${s.bedrooms} bed &bull; ${s.city}</div></div></a>`;
                    }).join('')}</div>`;
                }).catch(() => {});

            // Show recently viewed (excluding current)
            const recent = RecentlyViewed.get().filter(r => r.id !== p.id);
            if (recent.length > 0) {
                document.getElementById('recently-viewed').innerHTML = `<h3>Recently Viewed</h3><div class="similar-grid">${recent.slice(0, 4).map(r => {
                    const url = r.slug ? `/properties/${r.slug}/` : `/properties/${r.id}/`;
                    const img = r.primary_image
                        ? `<img src="${r.primary_image}" alt="${r.title}">`
                        : `<div class="placeholder">&#8962;</div>`;
                    return `<a href="${url}" class="similar-card">${img}<div class="similar-card-body"><h4>${r.title}</h4><div class="price">&pound;${Number(r.price).toLocaleString()}</div><div class="meta">${r.bedrooms || 0} bed &bull; ${r.city || ''}</div></div></a>`;
                }).join('')}</div>`;
            }
        })
        .catch(() => {
            document.getElementById('property-content').innerHTML = '<div class="alert alert-error">Property not found.</div>';
        });
</script>
{% endblock %}
