{% extends "base.html" %}

{% block title %}Viewing Slots - For Sale By Owner{% endblock %}

{% block extra_css %}
<style>
    .page-title { color: #115E66; margin-bottom: 0.5rem; }
    .page-subtitle { color: #4A5C62; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .page-subtitle a { color: #19747E; }

    /* Tab switcher */
    .slot-tabs { display: flex; gap: 0; margin-bottom: 1.25rem; border: 1px solid #E2E2E2; border-radius: 8px; overflow: hidden; }
    .slot-tab { flex: 1; padding: 0.6rem 1rem; background: #F7F7F7; color: #4A5C62; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .slot-tab:first-child { border-right: 1px solid #E2E2E2; }
    .slot-tab.active { background: #19747E; color: #fff; }

    /* Forms */
    .add-slot-form { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .add-slot-form h3 { color: #115E66; margin-bottom: 0.75rem; font-size: 1.1rem; }
    .slot-panel { display: none; }
    .slot-panel.active { display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; margin-bottom: 0.2rem; font-size: 0.85rem; font-weight: 500; color: #4A5C62; }
    .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #E2E2E2; border-radius: 6px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box; }

    /* Day chips */
    .day-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .day-chip { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; border: 2px solid #E2E2E2; background: #F7F7F7; color: #4A5C62; font-size: 0.8rem; font-weight: 600; cursor: pointer; user-select: none; transition: border-color 0.15s, background 0.15s, color 0.15s; }
    .day-chip.selected { border-color: #19747E; background: #19747E; color: #fff; }
    .day-chips-label { font-size: 0.85rem; font-weight: 500; color: #4A5C62; margin-bottom: 0.4rem; }
    .day-chips-hint { font-size: 0.78rem; color: #8A9BA1; margin-bottom: 0.6rem; }

    /* Slot cards */
    .slot-list { list-style: none; }
    .slot-card { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
    .slot-info { flex: 1; }
    .slot-date { font-weight: 600; color: #115E66; font-size: 1rem; }
    .slot-time { color: #4A5C62; font-size: 0.9rem; margin-top: 0.15rem; }
    .slot-meta { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.25rem; }
    .slot-bookings { font-size: 0.8rem; color: #4A5C62; }
    .booking-bar { width: 80px; height: 6px; background: #E2E2E2; border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 0.4rem; }
    .booking-bar-fill { height: 100%; background: #19747E; border-radius: 3px; }
    .slot-available { font-size: 0.75rem; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
    .slot-available.yes { background: #D1E8E2; color: #115E66; }
    .slot-available.no { background: #f8d7d4; color: #B03A2E; }

    .section-header { font-size: 0.85rem; font-weight: 600; color: #19747E; text-transform: uppercase; letter-spacing: 0.05em; margin: 1.25rem 0 0.5rem; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: #4A5C62; }
    .empty-state p { margin-bottom: 1rem; }

    @media (max-width: 768px) {
        .form-row, .form-row-3 { grid-template-columns: 1fr; }
        .slot-card { flex-direction: column; align-items: flex-start; }
    }
</style>
{% endblock %}

{% block content %}
<h2 class="page-title" id="page-title">Viewing Slots</h2>
<p class="page-subtitle" id="page-subtitle">Loading...</p>
<div id="slots-content"><p>Loading...</p></div>
{% endblock %}

{% block extra_js %}
<script>
    const propertyId = window.location.pathname.match(/\/properties\/(\d+)/)?.[1];
    if (!propertyId) {
        document.getElementById('slots-content').innerHTML = '<div class="alert alert-error">Invalid property URL.</div>';
        throw new Error('No property ID');
    }

    let isOwner = false;

    // ── Day chip state ─────────────────────────────────────────────
    const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const DAY_FULL  = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    let selectedDays = new Set();

    function toggleDay(idx) {
        if (selectedDays.has(idx)) {
            selectedDays.delete(idx);
        } else {
            selectedDays.add(idx);
        }
        document.querySelectorAll('.day-chip').forEach((chip, i) => {
            chip.classList.toggle('selected', selectedDays.has(i));
        });
        renderPerDayTimes();
    }

    function renderPerDayTimes() {
        const container = document.getElementById('per-day-times');
        if (!container) return;
        const sorted = [...selectedDays].sort();
        if (sorted.length === 0) {
            container.innerHTML = '';
            return;
        }
        container.innerHTML = sorted.map(d => `
            <div class="form-row-3" style="margin-bottom:0.5rem; align-items:end;">
                <div class="form-group" style="margin-bottom:0;">
                    <label style="font-weight:600;color:#115E66;">${DAY_FULL[d]}</label>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Start</label>
                    <input type="time" id="day-start-${d}" value="10:00">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>End</label>
                    <input type="time" id="day-end-${d}" value="11:00">
                </div>
            </div>
        `).join('');
    }

    function switchTab(tab) {
        document.querySelectorAll('.slot-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.slot-panel').forEach(p => p.classList.remove('active'));
        document.querySelector(`.slot-tab[data-tab="${tab}"]`).classList.add('active');
        document.getElementById(`panel-${tab}`).classList.add('active');
    }

    async function init() {
        try {
            const propRes = await Auth.authFetch(`/api/properties/${propertyId}/`, { headers: Auth.headers() });
            if (!propRes.ok) throw new Error('Property not found');
            const property = await propRes.json();

            document.getElementById('page-subtitle').innerHTML =
                `<a href="/properties/${property.slug || propertyId}/">${escHtml(property.title)}</a>`;

            if (Auth.isLoggedIn()) {
                const userRes = await Auth.authFetch('/auth/users/me/');
                const user = await userRes.json();
                isOwner = user.id === property.owner;
            }

            loadSlots();
        } catch (err) {
            document.getElementById('slots-content').innerHTML =
                '<div class="alert alert-error">Failed to load property details.</div>';
        }
    }

    async function loadSlots() {
        try {
            const res = await Auth.authFetch(`/api/properties/${propertyId}/viewing-slots/`, { headers: Auth.headers() });
            const slots = await res.json();
            const slotList = Array.isArray(slots) ? slots : (slots.results || []);

            let html = '';

            // ── Owner: Add-slot form ──────────────────────────────────
            if (isOwner) {
                const dayChips = DAY_NAMES.map((name, i) =>
                    `<span class="day-chip" data-day="${i}" onclick="toggleDay(${i})" title="${DAY_FULL[i]}">${name}</span>`
                ).join('');

                html += `
                    <div class="add-slot-form">
                        <h3>Add Viewing Slots</h3>
                        <div id="slot-msg" class="alert" style="display:none;"></div>

                        <!-- Tab switcher -->
                        <div class="slot-tabs">
                            <button class="slot-tab active" data-tab="weekly" onclick="switchTab('weekly')">&#128260; Weekly Recurring</button>
                            <button class="slot-tab" data-tab="oneoff" onclick="switchTab('oneoff')">&#128197; Specific Date</button>
                        </div>

                        <!-- Weekly panel -->
                        <div id="panel-weekly" class="slot-panel active">
                            <p class="day-chips-label">Select days</p>
                            <p class="day-chips-hint">Tap the days you want to add slots for, then set the time for each day below.</p>
                            <div class="day-chips">${dayChips}</div>
                            <div id="per-day-times"></div>
                            <div class="form-group" style="max-width:160px;">
                                <label>Max Bookings per Slot</label>
                                <input type="number" id="weekly-max" value="1" min="1" max="50" required>
                            </div>
                            <button type="button" class="btn btn-primary" style="width:100%;" onclick="addWeeklySlots()">
                                Add Weekly Slots
                            </button>
                        </div>

                        <!-- One-off panel -->
                        <div id="panel-oneoff" class="slot-panel">
                            <form onsubmit="addOneOffSlot(event)">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Date</label>
                                        <input type="date" id="slot-date" required>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Start Time</label>
                                        <input type="time" id="slot-start" required>
                                    </div>
                                    <div class="form-group">
                                        <label>End Time</label>
                                        <input type="time" id="slot-end" required>
                                    </div>
                                </div>
                                <div class="form-group" style="max-width:160px;">
                                    <label>Max Bookings</label>
                                    <input type="number" id="slot-max" value="1" min="1" max="50" required>
                                </div>
                                <button type="submit" class="btn btn-primary" id="add-slot-btn" style="width:100%;">Add One-off Slot</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            // ── Slot list ─────────────────────────────────────────────
            if (!slotList.length) {
                html += '<div class="empty-state"><p>No viewing slots have been set up yet.</p></div>';
            } else {
                const recurring = slotList.filter(s => s.day_of_week !== null && s.date === null);
                const oneOff    = slotList.filter(s => s.date !== null);

                if (recurring.length) {
                    html += '<p class="section-header">Weekly Schedule</p><div class="slot-list">';
                    recurring.forEach(s => { html += buildSlotCard(s); });
                    html += '</div>';
                }
                if (oneOff.length) {
                    html += '<p class="section-header">Specific Dates</p><div class="slot-list">';
                    oneOff.forEach(s => { html += buildSlotCard(s); });
                    html += '</div>';
                }
            }

            document.getElementById('slots-content').innerHTML = html;
        } catch (err) {
            document.getElementById('slots-content').innerHTML =
                '<div class="alert alert-error">Failed to load viewing slots.</div>';
        }
    }

    function buildSlotCard(s) {
        const dateStr = s.date
            ? new Date(s.date + 'T00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
            : (s.day_display ? 'Every ' + s.day_display : 'Recurring');
        const bookPct  = s.max_bookings > 0 ? Math.min(100, (s.current_bookings / s.max_bookings) * 100) : 0;
        const available = s.is_available !== false && s.current_bookings < s.max_bookings;
        return `
            <div class="slot-card">
                <div class="slot-info">
                    <div class="slot-date">${escHtml(dateStr)}</div>
                    <div class="slot-time">${escHtml(s.start_time)} – ${escHtml(s.end_time)}</div>
                    <div class="slot-meta">
                        <span class="slot-bookings">${s.current_bookings || 0}/${s.max_bookings} booked
                            <span class="booking-bar"><span class="booking-bar-fill" style="width:${bookPct}%"></span></span>
                        </span>
                        <span class="slot-available ${available ? 'yes' : 'no'}">${available ? 'Available' : 'Full'}</span>
                    </div>
                </div>
                <div>
                    ${isOwner ? `<button class="btn btn-danger" style="font-size:0.8rem;padding:0.3rem 0.8rem;" onclick="deleteSlot(${s.id})">Delete</button>` : ''}
                    ${!isOwner && available ? `<button class="btn btn-primary" style="font-size:0.85rem;" onclick="bookSlot(${s.id})">Book This Slot</button>` : ''}
                </div>
            </div>
        `;
    }

    async function addWeeklySlots() {
        if (selectedDays.size === 0) {
            showMsg('Please select at least one day.', 'error');
            return;
        }
        const maxBook = parseInt(document.getElementById('weekly-max').value) || 1;

        // Build per-day schedule
        const schedule = [];
        for (const d of [...selectedDays].sort()) {
            const st = document.getElementById(`day-start-${d}`)?.value;
            const et = document.getElementById(`day-end-${d}`)?.value;
            if (!st || !et) {
                showMsg(`Please set both start and end time for ${DAY_FULL[d]}.`, 'error');
                return;
            }
            if (st >= et) {
                showMsg(`End time must be after start time for ${DAY_FULL[d]}.`, 'error');
                return;
            }
            schedule.push({ day: d, start_time: st, end_time: et });
        }

        const btn = document.querySelector('#panel-weekly .btn-primary');
        btn.disabled = true;
        btn.textContent = 'Adding…';

        try {
            const res = await Auth.authFetch(
                `/api/properties/${propertyId}/viewing-slots/bulk-create/`,
                {
                    method: 'POST',
                    headers: Auth.headers(),
                    body: JSON.stringify({
                        schedule: schedule,
                        max_bookings: maxBook,
                    }),
                }
            );
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || 'Failed to add slots.');
            }
            const created = await res.json();
            const dayNames = [...selectedDays].map(d => DAY_FULL[d]).join(', ');
            selectedDays.clear();
            loadSlots();
            showMsg(`Added ${created.length} slot${created.length !== 1 ? 's' : ''} for ${dayNames}.`, 'success');
        } catch (err) {
            showMsg(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Add Weekly Slots';
        }
    }

    async function addOneOffSlot(event) {
        event.preventDefault();
        const btn = document.getElementById('add-slot-btn');
        btn.disabled = true;
        btn.textContent = 'Adding…';

        const body = {
            date:         document.getElementById('slot-date').value,
            start_time:   document.getElementById('slot-start').value,
            end_time:     document.getElementById('slot-end').value,
            max_bookings: parseInt(document.getElementById('slot-max').value) || 1,
        };

        try {
            const res = await Auth.authFetch(`/api/properties/${propertyId}/viewing-slots/`, {
                method: 'POST',
                headers: Auth.headers(),
                body: JSON.stringify(body),
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || Object.values(data).flat().join(', ') || 'Failed to add slot.');
            }
            document.getElementById('slot-date').value  = '';
            document.getElementById('slot-start').value = '';
            document.getElementById('slot-end').value   = '';
            document.getElementById('slot-max').value   = '1';
            loadSlots();
            showMsg('Viewing slot added.', 'success');
        } catch (err) {
            showMsg(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Add One-off Slot';
        }
    }

    function showMsg(text, type) {
        const msgEl = document.getElementById('slot-msg');
        if (!msgEl) return;
        msgEl.textContent = text;
        msgEl.className = `alert alert-${type === 'success' ? 'success' : 'error'}`;
        msgEl.style.display = 'block';
        setTimeout(() => { msgEl.style.display = 'none'; }, 5000);
    }

    async function deleteSlot(slotId) {
        if (!confirm('Delete this viewing slot?')) return;
        try {
            await Auth.authFetch(`/api/properties/${propertyId}/viewing-slots/${slotId}/`, {
                method: 'DELETE',
                headers: Auth.headers(),
            });
            loadSlots();
        } catch (err) {
            alert('Failed to delete slot.');
        }
    }

    async function bookSlot(slotId) {
        if (!Auth.isLoggedIn()) {
            window.location.href = '/login/';
            return;
        }
        if (!confirm('Book this viewing slot?')) return;
        try {
            const res = await Auth.authFetch(`/api/properties/${propertyId}/viewing-slots/${slotId}/book/`, {
                method: 'POST',
                headers: Auth.headers(),
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || 'Failed to book slot.');
            }
            alert('Viewing slot booked successfully!');
            loadSlots();
        } catch (err) {
            alert(err.message || 'Failed to book slot.');
        }
    }

    init();
</script>
{% endblock %}
