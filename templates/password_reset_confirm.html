{% extends 'base.html' %}
{% block title %}Reset Password - For Sale By Owner{% endblock %}
{% block extra_css %}
<style>
    .form-card { max-width: 460px; margin: 2rem auto; background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .form-card p { color: #4A5E56; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.35rem; font-weight: 500; font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #D4DDD9; border-radius: 6px; font-size: 0.95rem; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: #2D6A4F; box-shadow: 0 0 0 2px rgba(45,106,79,0.15); }
    .btn-block { width: 100%; text-align: center; padding: 0.75rem; font-size: 1rem; }
</style>
{% endblock %}
{% block content %}
<div class="form-card">
    <h1>Set New Password</h1>
    <p>Enter your new password below.</p>
    <div id="error-msg" class="alert alert-error" style="display:none;"></div>
    <div id="success-msg" class="alert alert-success" style="display:none;"></div>
    <form id="reset-form">
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" required minlength="8">
        </div>
        <div class="form-group">
            <label for="re_new_password">Confirm New Password</label>
            <input type="password" id="re_new_password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Reset Password</button>
    </form>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('reset-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    const pw = document.getElementById('new_password').value;
    const pw2 = document.getElementById('re_new_password').value;
    if (pw !== pw2) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
    }

    // Extract uid and token from URL path: /password-reset/{uid}/{token}/
    const parts = window.location.pathname.split('/').filter(Boolean);
    const uid = parts[1];
    const token = parts[2];

    btn.disabled = true;
    btn.textContent = 'Resetting...';
    try {
        const res = await fetch('/auth/users/reset_password_confirm/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': Auth.getCSRFToken() },
            body: JSON.stringify({ uid, token, new_password: pw, re_new_password: pw2 })
        });
        if (res.ok || res.status === 204) {
            successEl.textContent = 'Password reset successfully! Redirecting to login...';
            successEl.style.display = 'block';
            document.getElementById('reset-form').style.display = 'none';
            setTimeout(() => window.location.href = '/login/', 2000);
        } else {
            const data = await res.json();
            const msgs = [];
            for (const [k, v] of Object.entries(data)) {
                msgs.push(...(Array.isArray(v) ? v : [v]));
            }
            errorEl.textContent = msgs.join(' ') || 'Failed to reset password. The link may have expired.';
            errorEl.style.display = 'block';
        }
    } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Reset Password';
});
</script>
{% endblock %}
