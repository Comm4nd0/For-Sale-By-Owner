{% extends "base.html" %}

{% block title %}Document vault — Sale Tracker — For Sale By Owner{% endblock %}

{% block extra_css %}
{% include "sale_tracker/_shared.html" %}
<style>
    .doc-groups { display: flex; flex-direction: column; gap: 1.25rem; }
    .doc-group h3 { color: #115E66; font-size: 1rem; margin: 0 0 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .doc-item { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 0.9rem 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .doc-item.missing { border-left: 3px solid #B03A2E; }
    .doc-item.have { border-left: 3px solid #19747E; }
    .doc-item.not_applicable { border-left: 3px solid #E2E2E2; opacity: 0.75; }
    .doc-item .title { font-weight: 600; color: #1A2C33; }
    .doc-item .helper { color: #4A5C62; font-size: 0.85rem; margin-top: 0.15rem; }
    .doc-item .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .doc-item .actions button, .doc-item .actions a { font-size: 0.85rem; padding: 0.4rem 0.75rem; }
    .tier-always { color: #B03A2E; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; }
    .tier-if_applicable { color: #A36A00; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; }
    .tier-situational { color: #4A5C62; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; }
    .upload-form { display: none; margin-top: 0.5rem; padding: 0.75rem; background: #F5F8F9; border-radius: 6px; }
    .upload-form.active { display: block; }
    .upload-form input[type="file"] { margin-bottom: 0.5rem; }
    .drop-hint { font-size: 0.78rem; color: #8FA3A8; margin-top: 0.25rem; }
</style>
{% endblock %}

{% block content %}
<div class="st-layout">
    <aside id="st-subnav" class="st-subnav"></aside>
    <div>
        <div class="st-page-header">
            <h2 class="st-page-title">Document vault</h2>
            <div class="st-meta" id="progress"></div>
        </div>
        <div id="error" class="alert alert-error" style="display:none;"></div>
        <div id="docs" class="st-loading">Loading documents…</div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');
    ST.saleId = parseInt(window.location.pathname.split('/').filter(Boolean)[1], 10);
    ST.renderSubnav(ST.saleId, 'documents');

    async function loadChecklist() {
        const container = document.getElementById('docs');
        const errorEl = document.getElementById('error');
        const progressEl = document.getElementById('progress');
        try {
            const items = await ST.fetch('documents/checklist/');
            container.classList.remove('st-loading');

            if (!Array.isArray(items) || !items.length) {
                container.innerHTML = `<p class="st-meta">No documents seeded yet — this shouldn't happen. Try reloading.</p>`;
                return;
            }

            const haveCount = items.filter(i => i.status === 'have' || i.status === 'not_applicable').length;
            progressEl.textContent = `${haveCount} of ${items.length} gathered`;

            // Group by category
            const groups = {};
            for (const item of items) {
                const key = item.category_display || item.category || 'Other';
                (groups[key] = groups[key] || []).push(item);
            }

            container.innerHTML = `<div class="doc-groups">` + Object.entries(groups).map(([cat, list]) => `
                <div class="doc-group">
                    <h3>${escHtml(cat)}</h3>
                    ${list.map(renderDoc).join('')}
                </div>
            `).join('') + `</div>`;

            wireUploadHandlers();
        } catch (err) {
            container.classList.remove('st-loading');
            container.innerHTML = '';
            errorEl.textContent = `Failed to load documents: ${err.message}`;
            errorEl.style.display = 'block';
        }
    }

    function renderDoc(d) {
        const statusClass = d.status || 'missing';
        const statusLabel = (d.status_display || d.status || '').replace('_', ' ');
        const tierLabel = (d.required_tier_display || d.required_tier || '').replace('_', ' ');
        const tierClass = `tier-${d.required_tier}`;
        const canUpload = d.source === 'seller_provides';
        return `
            <div class="doc-item ${statusClass}" data-id="${d.id}">
                <div style="flex:1; min-width:220px;">
                    <div class="title">${escHtml(d.title)}</div>
                    <div class="helper">${escHtml(d.helper_text || '')}</div>
                    <div style="margin-top:0.4rem;">
                        <span class="${tierClass}">${escHtml(tierLabel)}</span>
                        · ${ST.statusPill(d.status, statusLabel)}
                    </div>
                </div>
                <div class="actions">
                    ${canUpload && d.status === 'missing'
                        ? `<button class="btn btn-primary" data-action="show-upload" data-id="${d.id}">Upload</button>`
                        : ''}
                    ${d.has_file
                        ? `<button class="btn btn-secondary" data-action="remove" data-id="${d.id}">Remove</button>`
                        : ''}
                    ${d.status === 'missing'
                        ? `<button class="btn btn-secondary" data-action="mark-na" data-id="${d.id}">Not applicable</button>`
                        : ''}
                </div>
                <div class="upload-form" data-upload-for="${d.id}">
                    <input type="file" data-input-for="${d.id}" accept=".pdf,.png,.jpg,.jpeg,.webp">
                    <div class="drop-hint">Accepted: PDF, JPG, PNG, WebP — max 10 MB.</div>
                    <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                        <button class="btn btn-primary" data-action="upload" data-id="${d.id}">Save upload</button>
                        <button class="btn btn-secondary" data-action="hide-upload" data-id="${d.id}">Cancel</button>
                    </div>
                </div>
            </div>`;
    }

    function wireUploadHandlers() {
        document.querySelectorAll('[data-action]').forEach(btn => {
            btn.addEventListener('click', handleAction);
        });
    }

    async function handleAction(e) {
        const action = e.currentTarget.dataset.action;
        const id = e.currentTarget.dataset.id;
        if (action === 'show-upload') {
            document.querySelectorAll(`[data-upload-for="${id}"]`).forEach(f => f.classList.add('active'));
            return;
        }
        if (action === 'hide-upload') {
            document.querySelectorAll(`[data-upload-for="${id}"]`).forEach(f => f.classList.remove('active'));
            return;
        }
        if (action === 'upload') {
            await uploadFile(id);
            return;
        }
        if (action === 'remove') {
            if (!confirm('Remove this file? The checklist entry stays.')) return;
            await removeDoc(id);
            return;
        }
        if (action === 'mark-na') {
            // The API doesn't expose a "mark NA" endpoint yet on documents —
            // best available today is to upload a dummy or leave missing.
            // We surface a gentle note so users know.
            alert('Marking documents "not applicable" is coming soon. For now you can just leave it missing — it won\\'t block instruction if it\\'s conditional.');
            return;
        }
    }

    async function uploadFile(docId) {
        const fileInput = document.querySelector(`[data-input-for="${docId}"]`);
        const file = fileInput && fileInput.files && fileInput.files[0];
        if (!file) { alert('Choose a file first.'); return; }

        const form = new FormData();
        form.append('file', file);
        form.append('document_id', docId);

        try {
            const res = await Auth.authFetch(
                `/api/sale-tracker/sales/${ST.saleId}/documents/`,
                {
                    method: 'POST',
                    headers: Auth.headers(false),  // no Content-Type — browser sets multipart boundary
                    body: form,
                },
            );
            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                throw new Error(body.detail || body.file || `Upload failed (${res.status})`);
            }
            await loadChecklist();
        } catch (err) {
            alert(err.message);
        }
    }

    async function removeDoc(docId) {
        try {
            await ST.fetch(`documents/${docId}/`, { method: 'DELETE' });
            await loadChecklist();
        } catch (err) {
            alert(err.message);
        }
    }

    loadChecklist();
</script>
{% endblock %}
