{% extends "base.html" %}

{% block title %}Saved Properties - For Sale By Owner{% endblock %}

{% block extra_css %}
<style>
    .page-title { color: #115E66; margin-bottom: 1.5rem; }
    .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
    .property-card { border: 1px solid #E2E2E2; border-radius: 8px; overflow: hidden; transition: box-shadow 0.2s; background: #FFFFFF; display: block; text-decoration: none; color: inherit; position: relative; }
    .property-card:hover { box-shadow: 0 4px 12px rgba(26,60,46,0.12); }
    .property-card .card-img-wrap { position: relative; height: 200px; overflow: hidden; touch-action: pan-y pinch-zoom; }
    .property-card .card-slider { display: flex; height: 200px; transition: transform 0.3s ease; }
    .property-card .card-slider.swiping { transition: none; }
    .property-card .card-slider img { width: 100%; height: 200px; object-fit: cover; flex-shrink: 0; display: block; }
    .property-card .placeholder { width: 100%; height: 200px; background: #D1E8E2; display: flex; align-items: center; justify-content: center; color: #8FA3A8; font-size: 2.5rem; }
    .card-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; line-height: 28px; text-align: center; display: none; z-index: 2; }
    .card-img-wrap:hover .card-nav-btn { display: block; }
    .card-nav-btn:hover { background: rgba(0,0,0,0.7); }
    .card-nav-prev { left: 6px; }
    .card-nav-next { right: 6px; }
    .card-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 2; }
    .card-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); }
    .card-dots span.active { background: #fff; }
    .image-count-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.65); color: #fff; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px; z-index: 2; }
    .property-card-body { padding: 1.25rem; }
    .property-card h3 { margin-bottom: 0.25rem; color: #115E66; }
    .property-price { font-size: 1.4rem; font-weight: 700; color: #19747E; margin-bottom: 0.5rem; }
    .property-details { color: #4A5C62; font-size: 0.9rem; }
    .property-meta { display: flex; gap: 1rem; margin-top: 0.75rem; color: #4A5C62; font-size: 0.85rem; }
    .unsave-btn { position: absolute; top: 10px; right: 10px; background: rgba(26,60,46,0.7); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; line-height: 32px; text-align: center; }
    .unsave-btn:hover { background: #B03A2E; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: #4A5C62; }
    .empty-state p { margin-bottom: 1rem; font-size: 1.1rem; }
    @media (max-width: 768px) { .property-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<h2 class="page-title">Saved Properties</h2>
<div id="saved-list"><p>Loading...</p></div>
{% endblock %}

{% block extra_js %}
<script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    async function loadSaved() {
        const res = await fetch('/api/saved/', { headers: Auth.headers() });
        const data = await res.json();
        const results = data.results || data;
        const container = document.getElementById('saved-list');

        if (!results.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>You haven't saved any properties yet.</p>
                    <a href="/search/" class="btn btn-primary">Browse Properties</a>
                </div>`;
            return;
        }

        container.className = 'property-grid';
        container.innerHTML = results.map(s => {
            const p = s.property_detail;
            const url = p.slug ? `/properties/${p.slug}/` : `/properties/${p.id}/`;
            const cardImages = (p.images && p.images.length > 0) ? p.images : (p.primary_image ? [{image: p.primary_image}] : []);
            const imgCount = p.image_count || cardImages.length;
            let imgWrapHtml;
            if (cardImages.length === 0) {
                imgWrapHtml = `<div class="card-img-wrap"><div class="placeholder">&#8962;</div></div>`;
            } else if (cardImages.length === 1) {
                imgWrapHtml = `<div class="card-img-wrap">
                    <div class="card-slider"><img src="${cardImages[0].image}" alt="${p.title}" loading="lazy"></div>
                    ${imgCount > 1 ? `<span class="image-count-badge">&#128247; ${imgCount}</span>` : ''}
                </div>`;
            } else {
                const sliderImgs = cardImages.map(img => `<img src="${img.image}" alt="${p.title}" loading="lazy">`).join('');
                const dots = cardImages.map((_, i) => `<span class="${i === 0 ? 'active' : ''}"></span>`).join('');
                imgWrapHtml = `<div class="card-img-wrap" data-slide="0" data-count="${cardImages.length}">
                    <div class="card-slider">${sliderImgs}</div>
                    <button class="card-nav-btn card-nav-prev" onclick="cardSlide(event,-1)">&lsaquo;</button>
                    <button class="card-nav-btn card-nav-next" onclick="cardSlide(event,1)">&rsaquo;</button>
                    <div class="card-dots">${dots}</div>
                    <span class="image-count-badge">&#128247; ${imgCount}</span>
                </div>`;
            }
            return `
            <div class="property-card" style="position:relative;">
                <a href="${url}" style="text-decoration:none; color:inherit;">
                    ${imgWrapHtml}
                    <div class="property-card-body">
                        <h3>${p.title}</h3>
                        <div class="property-price">&pound;${Number(p.price).toLocaleString()}</div>
                        <div class="property-details">${p.address_line_1}, ${p.city} ${p.postcode}</div>
                        <div class="property-meta">
                            <span>${p.bedrooms} bed</span>
                            <span>${p.bathrooms} bath</span>
                            ${p.epc_rating ? `<span>EPC: ${p.epc_rating}</span>` : ''}
                        </div>
                    </div>
                </a>
                <button class="unsave-btn" title="Remove" onclick="unsave(${s.id}, this)">&times;</button>
            </div>`;
        }).join('');
    }

    async function unsave(savedId, btn) {
        await fetch(`/api/saved/${savedId}/`, { method: 'DELETE', headers: Auth.headers(false) });
        btn.closest('.property-card').remove();
        if (!document.querySelectorAll('.property-card').length) loadSaved();
    }

    loadSaved();

    function cardSlide(e, dir) {
        e.preventDefault();
        e.stopPropagation();
        const wrap = e.target.closest('.card-img-wrap');
        if (!wrap) return;
        const count = parseInt(wrap.dataset.count);
        let cur = parseInt(wrap.dataset.slide);
        cur = (cur + dir + count) % count;
        wrap.dataset.slide = cur;
        wrap.querySelector('.card-slider').style.transform = `translateX(-${cur * 100}%)`;
        const dots = wrap.querySelectorAll('.card-dots span');
        dots.forEach((d, i) => d.classList.toggle('active', i === cur));
    }

    document.addEventListener('touchstart', function(e) {
        const wrap = e.target.closest('.card-img-wrap[data-count]');
        if (!wrap) return;
        const slider = wrap.querySelector('.card-slider');
        const startX = e.touches[0].clientX;
        const startY = e.touches[0].clientY;
        let dx = 0;
        let locked = false;
        const cur = parseInt(wrap.dataset.slide);
        const count = parseInt(wrap.dataset.count);
        const width = wrap.offsetWidth;
        slider.classList.add('swiping');
        function onMove(ev) {
            dx = ev.touches[0].clientX - startX;
            const dy = ev.touches[0].clientY - startY;
            if (!locked && Math.abs(dy) > Math.abs(dx)) { cleanup(); return; }
            locked = true;
            ev.preventDefault();
            slider.style.transform = `translateX(${-(cur * width) + dx}px)`;
        }
        function onEnd() {
            slider.classList.remove('swiping');
            let next = cur;
            if (dx < -width * 0.2 && cur < count - 1) next = cur + 1;
            else if (dx > width * 0.2 && cur > 0) next = cur - 1;
            wrap.dataset.slide = next;
            slider.style.transform = `translateX(-${next * 100}%)`;
            wrap.querySelectorAll('.card-dots span').forEach((d, i) => d.classList.toggle('active', i === next));
            cleanup();
        }
        function cleanup() {
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
            document.removeEventListener('touchcancel', onEnd);
        }
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
        document.addEventListener('touchcancel', onEnd);
    }, { passive: true });
</script>
{% endblock %}
