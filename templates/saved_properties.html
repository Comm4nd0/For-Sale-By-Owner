{% extends "base.html" %}

{% block title %}Saved Properties - For Sale By Owner{% endblock %}

{% block extra_css %}
<style>
    .page-title { color: #115E66; margin-bottom: 1.5rem; }
    .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
    .property-card { border: 1px solid #E2E2E2; border-radius: 8px; overflow: hidden; transition: box-shadow 0.2s; background: #FFFFFF; display: block; text-decoration: none; color: inherit; position: relative; }
    .property-card:hover { box-shadow: 0 4px 12px rgba(26,60,46,0.12); }
    .property-card .card-img-wrap { position: relative; }
    .property-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .property-card .placeholder { width: 100%; height: 200px; background: #D1E8E2; display: flex; align-items: center; justify-content: center; color: #8FA3A8; font-size: 2.5rem; }
    .image-count-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.65); color: #fff; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }
    .property-card-body { padding: 1.25rem; }
    .property-card h3 { margin-bottom: 0.25rem; color: #115E66; }
    .property-price { font-size: 1.4rem; font-weight: 700; color: #19747E; margin-bottom: 0.5rem; }
    .property-details { color: #4A5C62; font-size: 0.9rem; }
    .property-meta { display: flex; gap: 1rem; margin-top: 0.75rem; color: #4A5C62; font-size: 0.85rem; }
    .unsave-btn { position: absolute; top: 10px; right: 10px; background: rgba(26,60,46,0.7); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; line-height: 32px; text-align: center; }
    .unsave-btn:hover { background: #B03A2E; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: #4A5C62; }
    .empty-state p { margin-bottom: 1rem; font-size: 1.1rem; }
    @media (max-width: 768px) { .property-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}

{% block content %}
<h2 class="page-title">Saved Properties</h2>
<div id="saved-list"><p>Loading...</p></div>
{% endblock %}

{% block extra_js %}
<script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    async function loadSaved() {
        const res = await fetch('/api/saved/', { headers: Auth.headers() });
        const data = await res.json();
        const results = data.results || data;
        const container = document.getElementById('saved-list');

        if (!results.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>You haven't saved any properties yet.</p>
                    <a href="/search/" class="btn btn-primary">Browse Properties</a>
                </div>`;
            return;
        }

        container.className = 'property-grid';
        container.innerHTML = results.map(s => {
            const p = s.property_detail;
            const url = p.slug ? `/properties/${p.slug}/` : `/properties/${p.id}/`;
            const imgHtml = p.primary_image
                ? `<img src="${p.primary_image}" alt="${p.title}">`
                : `<div class="placeholder">&#8962;</div>`;
            const imgCount = p.image_count || 0;
            const imgBadge = imgCount > 0 ? `<span class="image-count-badge">&#128247; ${imgCount}</span>` : '';
            return `
            <div class="property-card" style="position:relative;">
                <a href="${url}" style="text-decoration:none; color:inherit;">
                    <div class="card-img-wrap">${imgHtml}${imgBadge}</div>
                    <div class="property-card-body">
                        <h3>${p.title}</h3>
                        <div class="property-price">&pound;${Number(p.price).toLocaleString()}</div>
                        <div class="property-details">${p.address_line_1}, ${p.city} ${p.postcode}</div>
                        <div class="property-meta">
                            <span>${p.bedrooms} bed</span>
                            <span>${p.bathrooms} bath</span>
                            ${p.epc_rating ? `<span>EPC: ${p.epc_rating}</span>` : ''}
                        </div>
                    </div>
                </a>
                <button class="unsave-btn" title="Remove" onclick="unsave(${s.id}, this)">&times;</button>
            </div>`;
        }).join('');
    }

    async function unsave(savedId, btn) {
        await fetch(`/api/saved/${savedId}/`, { method: 'DELETE', headers: Auth.headers(false) });
        btn.closest('.property-card').remove();
        if (!document.querySelectorAll('.property-card').length) loadSaved();
    }

    loadSaved();
</script>
{% endblock %}
