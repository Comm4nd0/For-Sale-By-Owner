{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}For Sale By Owner{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/apple-touch-icon.png' %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1C2B25; background: #F6F9F7; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: #1A3C2E; color: white; padding: 1rem 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        header .logo a { display: flex; align-items: center; text-decoration: none; }
        header .logo svg { height: 44px; width: auto; }
        nav a { color: rgba(255,255,255,0.85); text-decoration: none; margin-left: 1.5rem; font-size: 0.95rem; }
        nav a:hover { color: white; }
        main { padding: 2rem 0; min-height: 60vh; }
        footer { background: #FFFFFF; padding: 1rem 0; text-align: center; color: #4A5E56; margin-top: 2rem; border-top: 1px solid #D4DDD9; }
        .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 6px; text-decoration: none; font-size: 0.95rem; cursor: pointer; border: none; font-family: inherit; }
        .btn-primary { background: #2D6A4F; color: white; }
        .btn-primary:hover { background: #40916C; }
        .btn-secondary { background: #D4DDD9; color: #1A3C2E; }
        .btn-secondary:hover { background: #8FA89E; color: #1C2B25; }
        .btn-danger { background: #B03A2E; color: white; }
        .btn-danger:hover { background: #922f25; }
        .alert { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-error { background: #f8d7d4; color: #B03A2E; border: 1px solid #e8a9a4; }
        .alert-success { background: #D8F3DC; color: #1A3C2E; border: 1px solid #a8d8b0; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="/">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="460" height="88">
                        <defs>
                            <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#E5A04A"/>
                                <stop offset="100%" style="stop-color:#C9872A"/>
                            </linearGradient>
                        </defs>
                        <rect x="18" y="52" width="54" height="38" rx="3" fill="#FFFFFF" opacity="0.15"/>
                        <polygon points="45,14 80,52 10,52" fill="url(#rg2)"/>
                        <rect x="35" y="68" width="20" height="22" rx="2.5" fill="#D8F3DC" opacity="0.9"/>
                        <circle cx="51" cy="80" r="2" fill="#C9872A"/>
                        <rect x="22" y="58" width="10" height="9" rx="1.5" fill="#FFFFFF" opacity="0.4"/>
                        <rect x="58" y="58" width="10" height="9" rx="1.5" fill="#FFFFFF" opacity="0.4"/>
                        <rect x="62" y="24" width="8" height="18" rx="1.5" fill="#1A3C2E"/>
                        <text x="105" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">For Sale</text>
                        <line x1="105" y1="60" x2="398" y2="60" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>
                        <text x="107" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="400" fill="#D8F3DC" letter-spacing="3">BY OWNER</text>
                        <text x="400" y="76" font-family="Arial, sans-serif" font-size="9.5" fill="#D8F3DC" letter-spacing="1.5" text-anchor="end" opacity="0.6">SELL DIRECT. KEEP MORE.</text>
                    </svg>
                </a>
            </div>
            <nav id="main-nav">
                <a href="/">Home</a>
                <span id="nav-auth"></span>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 For Sale By Owner &mdash; for-sale-by-owner.co.uk</p>
        </div>
    </footer>
    <script>
        // Auth helper used across all pages
        const Auth = {
            getToken() { return localStorage.getItem('auth_token'); },
            setToken(token) { localStorage.setItem('auth_token', token); },
            clear() { localStorage.removeItem('auth_token'); },
            isLoggedIn() { return !!this.getToken(); },
            headers(json = true) {
                const h = {};
                if (json) h['Content-Type'] = 'application/json';
                const t = this.getToken();
                if (t) h['Authorization'] = 'Token ' + t;
                return h;
            },
            requireAuth() {
                if (!this.isLoggedIn()) {
                    window.location.href = '/login/?next=' + encodeURIComponent(window.location.pathname);
                    return false;
                }
                return true;
            },
            async logout() {
                try {
                    await fetch('/auth/token/logout/', { method: 'POST', headers: this.headers() });
                } catch(e) {}
                this.clear();
                window.location.href = '/';
            }
        };

        // Render nav based on auth state
        (function() {
            const nav = document.getElementById('nav-auth');
            if (Auth.isLoggedIn()) {
                nav.innerHTML = `
                    <a href="/my-listings/">My Listings</a>
                    <a href="/properties/new/">List Property</a>
                    <a href="#" onclick="Auth.logout(); return false;">Logout</a>
                `;
            } else {
                nav.innerHTML = `
                    <a href="/login/">Login</a>
                    <a href="/register/">Register</a>
                `;
            }
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
