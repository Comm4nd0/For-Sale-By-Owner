{% extends "base.html" %}

{% block title %}Search Results - For Sale By Owner{% endblock %}

{% block extra_css %}
<style>
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
    .results-header h2 { color: #115E66; font-size: 1.5rem; }
    .results-count { color: #4A5C62; font-size: 0.95rem; margin-bottom: 1rem; }

    .active-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .filter-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #D1E8E2;
        color: #115E66;
        padding: 0.3rem 0.75rem;
        border-radius: 20px;
        font-size: 0.85rem;
    }
    .filter-tag .remove {
        cursor: pointer;
        font-weight: 700;
        opacity: 0.6;
        font-size: 1rem;
        line-height: 1;
    }
    .filter-tag .remove:hover { opacity: 1; }

    .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
    .property-card { border: 1px solid #E2E2E2; border-radius: 8px; overflow: hidden; transition: box-shadow 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; background: #FFFFFF; }
    .property-card:hover { box-shadow: 0 4px 12px rgba(26,60,46,0.12); }
    .property-card .card-img-wrap { position: relative; height: 200px; overflow: hidden; touch-action: pan-y pinch-zoom; }
    .property-card .card-slider { display: flex; height: 200px; transition: transform 0.3s ease; }
    .property-card .card-slider.swiping { transition: none; }
    .property-card .card-slider img { width: 100%; height: 200px; object-fit: cover; flex-shrink: 0; display: block; }
    .property-card .placeholder { width: 100%; height: 200px; background: #D1E8E2; display: flex; align-items: center; justify-content: center; color: #8FA3A8; font-size: 2.5rem; }
    .card-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1rem; line-height: 28px; text-align: center; display: none; z-index: 2; }
    .card-img-wrap:hover .card-nav-btn { display: block; }
    .card-nav-btn:hover { background: rgba(0,0,0,0.7); }
    .card-nav-prev { left: 6px; }
    .card-nav-next { right: 6px; }
    .card-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 2; }
    .card-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); }
    .card-dots span.active { background: #fff; }
    .image-count-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.65); color: #fff; font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px; z-index: 2; }
    .property-card-body { padding: 1.25rem; }
    .property-card h3 { margin-bottom: 0.25rem; color: #115E66; }
    .property-price { font-size: 1.4rem; font-weight: 700; color: #19747E; margin-bottom: 0.5rem; }
    .property-details { color: #4A5C62; font-size: 0.9rem; }
    .property-meta { display: flex; gap: 1rem; margin-top: 0.75rem; color: #4A5C62; font-size: 0.85rem; }

    .empty-state { text-align: center; padding: 4rem 1rem; }
    .empty-state h3 { color: #115E66; margin-bottom: 0.75rem; }
    .empty-state p { color: #4A5C62; margin-bottom: 1.5rem; }
    .empty-state .btn { margin: 0 0.5rem; }

    /* Lazy load spinner & end-of-results */
    .load-more-sentinel { display: flex; justify-content: center; padding: 2rem 0; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E2E2E2; border-top-color: #19747E; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .end-of-results { text-align: center; padding: 1.5rem 0; color: #8FA3A8; font-size: 0.9rem; }

    @media (max-width: 768px) {
        .results-header { flex-direction: column; align-items: flex-start; }
        .property-grid { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div class="results-header">
    <h2>Search Results</h2>
    <div style="display:flex; gap:0.5rem;">
        <button class="btn btn-secondary" id="save-search-btn" style="display:none;" onclick="saveCurrentSearch()">Save Search</button>
        <a href="/" class="btn btn-secondary">Modify Search</a>
    </div>
</div>
<div id="active-filters" class="active-filters"></div>
<div id="results-count" class="results-count"></div>
<div id="results">
    <p>Searching...</p>
</div>
<div id="load-more" class="load-more-sentinel" style="display:none;">
    <div class="spinner"></div>
</div>
<div id="end-of-results" class="end-of-results" style="display:none;"></div>
{% endblock %}

{% block extra_js %}
<script>
    const FILTER_LABELS = {
        location: 'Location',
        property_type: 'Type',
        min_price: 'Min Price',
        max_price: 'Max Price',
        min_bedrooms: 'Bedrooms',
        min_bathrooms: 'Bathrooms',
    };

    const TYPE_NAMES = {
        detached: 'Detached',
        semi_detached: 'Semi-Detached',
        terraced: 'Terraced',
        flat: 'Flat / Apartment',
        bungalow: 'Bungalow',
        cottage: 'Cottage',
        land: 'Land',
        other: 'Other',
    };

    function formatPrice(val) {
        return '\u00A3' + Number(val).toLocaleString();
    }

    function formatFilterValue(key, val) {
        if (key === 'property_type') return TYPE_NAMES[val] || val;
        if (key === 'min_price' || key === 'max_price') return formatPrice(val);
        if (key === 'min_bedrooms') return val + '+';
        if (key === 'min_bathrooms') return val + '+';
        return val;
    }

    function renderActiveFilters(params) {
        const container = document.getElementById('active-filters');
        const tags = [];
        for (const [key, val] of params.entries()) {
            if (key === 'page') continue;
            const label = FILTER_LABELS[key] || key;
            const display = formatFilterValue(key, val);
            tags.push(`<span class="filter-tag">
                ${label}: ${display}
                <span class="remove" data-key="${key}">&times;</span>
            </span>`);
        }
        container.innerHTML = tags.join('');

        container.querySelectorAll('.remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const newParams = new URLSearchParams(window.location.search);
                newParams.delete(btn.dataset.key);
                newParams.delete('page');
                window.location.href = '/search/' + (newParams.toString() ? '?' + newParams.toString() : '');
            });
        });
    }

    // --- Infinite scroll state ---
    let nextPage = 1;
    let totalCount = 0;
    let loadedCount = 0;
    let isLoading = false;
    let hasMore = true;

    function renderCard(p) {
        const url = p.slug ? `/properties/${p.slug}/` : `/properties/${p.id}/`;
        const cardImages = (p.images && p.images.length > 0) ? p.images : (p.primary_image ? [{image: p.primary_image}] : []);
        const imgCount = p.image_count || cardImages.length;
        let imgWrapHtml;
        if (cardImages.length === 0) {
            imgWrapHtml = `<div class="card-img-wrap"><div class="placeholder">&#8962;</div></div>`;
        } else if (cardImages.length === 1) {
            imgWrapHtml = `<div class="card-img-wrap">
                <div class="card-slider"><img src="${cardImages[0].image}" alt="${escHtml(p.title)}" loading="lazy"></div>
                ${imgCount > 1 ? `<span class="image-count-badge">&#128247; ${imgCount}</span>` : ''}
            </div>`;
        } else {
            const sliderImgs = cardImages.map(img => `<img src="${img.image}" alt="${escHtml(p.title)}" loading="lazy">`).join('');
            const dots = cardImages.map((_, i) => `<span class="${i === 0 ? 'active' : ''}"></span>`).join('');
            imgWrapHtml = `<div class="card-img-wrap" data-slide="0" data-count="${cardImages.length}">
                <div class="card-slider">${sliderImgs}</div>
                <button class="card-nav-btn card-nav-prev" onclick="cardSlide(event,-1)">&lsaquo;</button>
                <button class="card-nav-btn card-nav-next" onclick="cardSlide(event,1)">&rsaquo;</button>
                <div class="card-dots">${dots}</div>
                <span class="image-count-badge">&#128247; ${imgCount}</span>
            </div>`;
        }
        return `<a href="${url}" class="property-card">
            ${imgWrapHtml}
            <div class="property-card-body">
                <h3>${escHtml(p.title)} ${p.owner_is_verified ? '<span style="color:#19747E; font-size:0.75rem;">&#10003; Verified</span>' : ''}</h3>
                <div class="property-price">&pound;${Number(p.price).toLocaleString()}</div>
                <div class="property-details">${p.property_type_display}</div>
                <div class="property-details">${p.address_line_1 ? p.address_line_1 + ', ' : ''}${p.city}</div>
                <div class="property-meta">
                    <span>${p.bedrooms} bed</span>
                    <span>${p.bathrooms} bath</span>
                    <span>${p.reception_rooms} reception</span>
                    ${p.epc_rating ? `<span>EPC: ${p.epc_rating}</span>` : ''}
                </div>
            </div>
        </a>`;
    }

    function appendResults(data) {
        const container = document.getElementById('results');
        const results = data.results || data;
        totalCount = data.count || results.length;

        if (loadedCount === 0 && results.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>No properties found</h3>
                    <p>Try adjusting your search filters to find more results.</p>
                    <a href="/search/" class="btn btn-secondary">Clear All Filters</a>
                    <a href="/" class="btn btn-primary">Back to Search</a>
                </div>`;
            hasMore = false;
            return;
        }

        // First batch: set up the grid
        if (loadedCount === 0) {
            container.className = 'property-grid';
            container.innerHTML = '';
        }

        // Append new cards
        container.insertAdjacentHTML('beforeend', results.map(renderCard).join(''));
        loadedCount += results.length;

        // Update count text
        document.getElementById('results-count').textContent =
            `Showing ${loadedCount} of ${totalCount} propert${totalCount === 1 ? 'y' : 'ies'}`;

        // Check if there's more to load
        hasMore = !!data.next;
        if (!hasMore && loadedCount > 0) {
            document.getElementById('load-more').style.display = 'none';
            if (totalCount > 20) {
                const endEl = document.getElementById('end-of-results');
                endEl.textContent = `All ${totalCount} properties loaded`;
                endEl.style.display = 'block';
            }
        }
    }

    async function loadNextPage() {
        if (isLoading || !hasMore) return;
        isLoading = true;
        document.getElementById('load-more').style.display = 'flex';

        try {
            const fetchParams = new URLSearchParams(window.location.search);
            fetchParams.set('page', nextPage);

            const res = await Auth.authFetch('/api/properties/?' + fetchParams.toString(), { headers: Auth.headers() });
            if (!res.ok) {
                const body = await res.text();
                throw new Error(`HTTP ${res.status}: ${body}`);
            }
            const data = await res.json();
            appendResults(data);
            nextPage++;
        } catch (err) {
            console.error('Search fetch error:', err);
            hasMore = false;
            document.getElementById('load-more').style.display = 'none';
            if (loadedCount === 0) {
                document.getElementById('results').innerHTML =
                    `<div class="empty-state"><p>Failed to load results: ${escHtml(err.message)}. Please try again.</p></div>`;
            }
        }
        isLoading = false;
    }

    // Save search feature
    if (Auth.isLoggedIn()) {
        document.getElementById('save-search-btn').style.display = 'inline-block';
    }

    async function saveCurrentSearch() {
        const p = new URLSearchParams(window.location.search);
        const body = {};
        if (p.get('location')) body.location = p.get('location');
        if (p.get('property_type')) body.property_type = p.get('property_type');
        if (p.get('min_price')) body.min_price = p.get('min_price');
        if (p.get('max_price')) body.max_price = p.get('max_price');
        if (p.get('min_bedrooms')) body.min_bedrooms = parseInt(p.get('min_bedrooms'));
        if (p.get('min_bathrooms')) body.min_bathrooms = parseInt(p.get('min_bathrooms'));
        if (p.get('epc_rating')) body.epc_rating = p.get('epc_rating');
        body.email_alerts = true;

        // Build a name from the search criteria
        const parts = [];
        if (body.location) parts.push(body.location);
        if (body.property_type) parts.push(TYPE_NAMES[body.property_type] || body.property_type);
        if (body.min_bedrooms) parts.push(body.min_bedrooms + '+ bed');
        body.name = parts.join(', ') || 'My Search';

        try {
            const res = await fetch('/api/saved-searches/', {
                method: 'POST',
                headers: Auth.headers(),
                body: JSON.stringify(body),
            });
            const btn = document.getElementById('save-search-btn');
            if (res.ok) {
                btn.textContent = 'Search Saved!';
                btn.disabled = true;
                setTimeout(() => { btn.textContent = 'Save Search'; btn.disabled = false; }, 2000);
            } else {
                btn.textContent = 'Already Saved';
                setTimeout(() => { btn.textContent = 'Save Search'; }, 2000);
            }
        } catch {
            alert('Failed to save search.');
        }
    }

    // --- Init: render filters and start loading ---
    const params = new URLSearchParams(window.location.search);
    // Remove any leftover page param from URL (infinite scroll handles paging)
    if (params.has('page')) {
        params.delete('page');
        history.replaceState(null, '', '/search/' + (params.toString() ? '?' + params.toString() : ''));
    }
    renderActiveFilters(params);

    // IntersectionObserver to trigger loading when sentinel is near viewport
    const sentinel = document.getElementById('load-more');
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && hasMore && !isLoading) {
            loadNextPage();
        }
    }, { rootMargin: '400px' });  // Start loading 400px before it's visible
    observer.observe(sentinel);

    // Kick off the first load
    loadNextPage();

    // --- Card image slider ---
    function cardSlide(e, dir) {
        e.preventDefault();
        e.stopPropagation();
        const wrap = e.target.closest('.card-img-wrap');
        if (!wrap) return;
        const count = parseInt(wrap.dataset.count);
        let cur = parseInt(wrap.dataset.slide);
        cur = (cur + dir + count) % count;
        wrap.dataset.slide = cur;
        wrap.querySelector('.card-slider').style.transform = `translateX(-${cur * 100}%)`;
        const dots = wrap.querySelectorAll('.card-dots span');
        dots.forEach((d, i) => d.classList.toggle('active', i === cur));
    }

    // Touch swipe support
    document.addEventListener('touchstart', function(e) {
        const wrap = e.target.closest('.card-img-wrap[data-count]');
        if (!wrap) return;
        const slider = wrap.querySelector('.card-slider');
        const link = wrap.closest('a');
        const startX = e.touches[0].clientX;
        const startY = e.touches[0].clientY;
        let dx = 0;
        let locked = false;
        let swiped = false;
        const cur = parseInt(wrap.dataset.slide);
        const count = parseInt(wrap.dataset.count);
        const width = wrap.offsetWidth;

        slider.classList.add('swiping');

        function blockClick(ev) { ev.preventDefault(); ev.stopPropagation(); }

        function onMove(ev) {
            dx = ev.touches[0].clientX - startX;
            const dy = ev.touches[0].clientY - startY;
            if (!locked && Math.abs(dy) > Math.abs(dx)) { cleanup(); return; }
            locked = true;
            swiped = true;
            ev.preventDefault();
            const offset = -(cur * width) + dx;
            slider.style.transform = `translateX(${offset}px)`;
        }
        function onEnd() {
            slider.classList.remove('swiping');
            const threshold = width * 0.2;
            let next = cur;
            if (dx < -threshold && cur < count - 1) next = cur + 1;
            else if (dx > threshold && cur > 0) next = cur - 1;
            wrap.dataset.slide = next;
            slider.style.transform = `translateX(-${next * 100}%)`;
            const dots = wrap.querySelectorAll('.card-dots span');
            dots.forEach((d, i) => d.classList.toggle('active', i === next));
            if (swiped && link) {
                link.addEventListener('click', blockClick, { capture: true, once: true });
                setTimeout(() => link.removeEventListener('click', blockClick, { capture: true }), 300);
            }
            cleanup();
        }
        function cleanup() {
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
            document.removeEventListener('touchcancel', onEnd);
        }
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onEnd);
        document.addEventListener('touchcancel', onEnd);
    }, { passive: true });
</script>
{% endblock %}
