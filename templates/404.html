{% extends 'base.html' %}
{% block title %}Page Not Found - For Sale By Owner{% endblock %}
{% block content %}
<div style="text-align:center; padding:4rem 1rem;">
    <h1 style="font-size:4rem; color:#2D6A4F; margin-bottom:0.5rem;">404</h1>
    <h2 style="font-size:1.5rem; margin-bottom:1rem; color:#1C2B25;">Page Not Found</h2>
    <p style="color:#4A5E56; margin-bottom:2rem; max-width:500px; margin-left:auto; margin-right:auto;">

    <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">

</div>
{% endblock %}
