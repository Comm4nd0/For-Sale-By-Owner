{% extends "base.html" %}

{% block title %}Seller Dashboard - For Sale By Owner{% endblock %}

{% block extra_css %}
<style>
    .page-title { color: #115E66; margin-bottom: 1.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1.25rem; text-align: center; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #115E66; }
    .stat-card .label { font-size: 0.85rem; color: #4A5C62; margin-top: 0.25rem; }
    .stat-card.highlight { border-color: #19747E; background: #D1E8E2; }

    .dash-section { margin-bottom: 2rem; }
    .dash-section h3 { color: #115E66; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #E2E2E2; }

    .tab-nav { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #E2E2E2; }
    .tab-btn { padding: 0.6rem 1.25rem; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; font-size: 0.95rem; font-family: inherit; color: #4A5C62; display: inline-flex; align-items: center; gap: 0.4rem; }
    .tab-btn.active { color: #115E66; font-weight: 600; border-bottom-color: #19747E; }
    .tab-btn:hover { color: #115E66; }
    .tab-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; line-height: 1; }
    .tab-badge.unread { background: #B03A2E; color: white; }
    .tab-badge.pending { background: #856404; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .enquiry-from { font-weight: 600; color: #115E66; }
    .enquiry-property { font-size: 0.85rem; color: #4A5C62; margin-bottom: 0.25rem; }
    .enquiry-message { color: #1A2C33; font-size: 0.9rem; }

    .viewing-item { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
    .viewing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .viewing-status { font-size: 0.75rem; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
    .status-pending { background: #FFF3CD; color: #856404; }
    .status-confirmed { background: #D1E8E2; color: #115E66; }
    .status-declined { background: #f8d7d4; color: #B03A2E; }
    .status-completed { background: #E2E2E2; color: #4A5C62; }
    .status-cancelled { background: #E2E2E2; color: #4A5C62; }
    .viewing-details { font-size: 0.9rem; color: #1A2C33; }
    .viewing-actions { margin-top: 0.5rem; display: flex; gap: 0.5rem; }

    .pagination { display: flex; justify-content: center; gap: 0.75rem; margin-top: 1rem; }
    .pagination button { padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid #E2E2E2; background: white; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
    .pagination button:hover { background: #D1E8E2; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: #4A5C62; }
    .empty-state p { margin-bottom: 1rem; }

    /* Offers tab */
    .offer-item { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
    .offer-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.25rem; }
    .offer-item-amount { font-size: 1.2rem; font-weight: 700; color: #19747E; }
    .offer-item-attrs { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .offer-attr { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; font-weight: 600; background: #D1E8E2; color: #115E66; }
    .offer-status { font-size: 0.75rem; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
    .offer-status.submitted { background: #D6EAF8; color: #1A5276; }
    .offer-status.under_review { background: #FFF3CD; color: #856404; }
    .offer-status.accepted { background: #D1E8E2; color: #115E66; }
    .offer-status.rejected { background: #f8d7d4; color: #B03A2E; }
    .offer-status.countered { background: #FFF3CD; color: #7D6608; }
    .offer-status.withdrawn, .offer-status.expired { background: #E2E2E2; color: #4A5C62; }
    .offer-item-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }

    /* Messages tab */
    .msg-item { background: #FFFFFF; border: 1px solid #E2E2E2; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; transition: border-color 0.15s; }
    .msg-item:hover { border-color: #19747E; }
    .msg-item.unread { border-left: 3px solid #19747E; }
    .msg-avatar { width: 38px; height: 38px; border-radius: 50%; background: #D1E8E2; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #115E66; font-size: 0.95rem; flex-shrink: 0; }
    .msg-info { flex: 1; min-width: 0; }
    .msg-name { font-weight: 600; color: #115E66; font-size: 0.9rem; }
    .msg-property { font-size: 0.8rem; color: #4A5C62; }
    .msg-preview { font-size: 0.82rem; color: #8FA3A8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-meta { text-align: right; flex-shrink: 0; }
    .msg-time { font-size: 0.75rem; color: #8FA3A8; }
    .msg-unread-badge { display: inline-block; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; font-size: 0.7rem; font-weight: 700; line-height: 18px; text-align: center; background: #B03A2E; color: white; margin-top: 0.2rem; }

    /* Reply threads */
    .reply-thread { margin-top: 0.75rem; padding-left: 1rem; border-left: 3px solid #D1E8E2; }
    .reply-item { padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    .reply-item:last-child { border-bottom: none; }
    .reply-author { font-weight: 600; font-size: 0.85rem; color: #115E66; }
    .reply-date { font-size: 0.75rem; color: #8FA3A8; margin-left: 0.5rem; }
    .reply-message { font-size: 0.88rem; color: #1A2C33; margin-top: 0.2rem; }
    .reply-form { margin-top: 0.75rem; display: none; }
    .reply-form.open { display: block; }
    .reply-form textarea { width: 100%; min-height: 60px; resize: vertical; padding: 0.5rem; border: 1px solid #E2E2E2; border-radius: 6px; font-size: 0.9rem; font-family: inherit; margin-bottom: 0.5rem; }
    .reply-form .reply-form-actions { display: flex; gap: 0.5rem; }

    @media (max-width: 768px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
        .stat-card { padding: 0.85rem 0.5rem; }
        .stat-card .value { font-size: 1.5rem; }
        .stat-card .label { font-size: 0.75rem; }

        .tab-nav { gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-btn { font-size: 0.85rem; padding: 0.5rem 0.75rem; white-space: nowrap; }

        .viewing-header { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
        .viewing-item { padding: 0.85rem; }
        .viewing-details { font-size: 0.82rem; word-break: break-word; }

        .viewing-actions { flex-wrap: wrap; }
        .viewing-actions .btn { flex: 1 1 auto; text-align: center; min-width: 0; }

        .reply-form textarea { min-height: 50px; font-size: 0.85rem; }
        .reply-form-actions { flex-wrap: wrap; }
        .reply-form-actions .btn { flex: 1; text-align: center; }

        .reply-thread { padding-left: 0.6rem; }
        .reply-item { font-size: 0.85rem; }

        .pagination { gap: 0.4rem; }
        .pagination button { padding: 0.35rem 0.6rem; font-size: 0.8rem; }
        .pagination span { font-size: 0.8rem; }

        .page-title { font-size: 1.3rem; }
    }

    @media (max-width: 400px) {
        .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .stat-card .value { font-size: 1.3rem; }
        .tab-btn { font-size: 0.8rem; padding: 0.45rem 0.6rem; }
    }
</style>
{% endblock %}

{% block content %}
<h2 class="page-title">Seller Dashboard</h2>
<div id="dashboard-content"><p>Loading...</p></div>
{% endblock %}

{% block extra_js %}
<script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    let viewingPage = 1;

    async function loadDashboard() {
        try {
            const [statsRes, offersRes, roomsRes] = await Promise.all([
                fetch('/api/dashboard/stats/', { headers: Auth.headers() }),
                Auth.authFetch('/api/offers/received/', { headers: Auth.headers() }).catch(() => null),
                Auth.authFetch('/api/chat-rooms/', { headers: Auth.headers() }).catch(() => null),
            ]);
            const stats = await statsRes.json();

            // Count pending offers and unread messages
            let pendingOffers = 0;
            let unreadMessages = 0;
            if (offersRes && offersRes.ok) {
                const offersData = await offersRes.json();
                const offers = offersData.results || offersData;
                pendingOffers = (Array.isArray(offers) ? offers : []).filter(o => o.status === 'submitted' || o.status === 'under_review').length;
            }
            if (roomsRes && roomsRes.ok) {
                const roomsData = await roomsRes.json();
                const rooms = roomsData.results || roomsData;
                unreadMessages = (Array.isArray(rooms) ? rooms : []).reduce((sum, r) => sum + (r.unread_count || 0), 0);
            }

            document.getElementById('dashboard-content').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="value">${stats.active_listings}</div><div class="label">Listings</div></div>
                    <div class="stat-card"><div class="value">${stats.total_views}</div><div class="label">Views</div></div>
                    <div class="stat-card ${unreadMessages > 0 ? 'highlight' : ''}"><div class="value">${unreadMessages}</div><div class="label">Unread Messages</div></div>
                    <div class="stat-card"><div class="value">${stats.total_saves}</div><div class="label">Saved</div></div>
                    <div class="stat-card"><div class="value">${stats.pending_viewings}</div><div class="label">Viewings</div></div>
                </div>

                <div class="tab-nav">
                    <button class="tab-btn active" onclick="switchTab('messages', this)">Messages ${unreadMessages > 0 ? `<span class="tab-badge unread">${unreadMessages}</span>` : ''}</button>
                    <button class="tab-btn" onclick="switchTab('viewings', this)">Viewings ${stats.pending_viewings > 0 ? `<span class="tab-badge pending">${stats.pending_viewings}</span>` : ''}</button>
                    <button class="tab-btn" onclick="switchTab('offers', this)">Offers ${pendingOffers > 0 ? `<span class="tab-badge pending">${pendingOffers}</span>` : ''}</button>
                </div>

                <div class="tab-content active" id="tab-messages">
                    <div id="messages-list"></div>
                </div>
                <div class="tab-content" id="tab-viewings">
                    <div id="viewing-list"></div>
                    <div id="viewing-pagination" class="pagination"></div>
                </div>
                <div class="tab-content" id="tab-offers">
                    <div id="offers-list"></div>
                </div>
            `;

            loadDashboardMessages();
            loadViewings();
            loadDashboardOffers();
        } catch (err) {
            document.getElementById('dashboard-content').innerHTML = '<div class="alert alert-error">Failed to load dashboard.</div>';
        }
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }



    async function loadViewings() {
        const res = await fetch(`/api/viewings/received/?page=${viewingPage}`, { headers: Auth.headers() });
        const data = await res.json();
        const viewings = data.results || data;
        const listEl = document.getElementById('viewing-list');

        if (!viewings.length) {
            listEl.innerHTML = '<div class="empty-state"><p>No viewing requests yet.</p></div>';
            document.getElementById('viewing-pagination').innerHTML = '';
            return;
        }

        listEl.innerHTML = viewings.map(v => `
            <div class="viewing-item">
                <div class="viewing-header">
                    <span class="enquiry-from">${escHtml(v.name)}</span>
                    <span class="viewing-status status-${escHtml(v.status)}">${escHtml(v.status_display)}</span>
                </div>
                <div class="enquiry-property">Re: ${escHtml(v.property_title)}</div>
                <div class="viewing-details">
                    <strong>Date:</strong> ${new Date(v.preferred_date + 'T00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} at ${escHtml(v.preferred_time)}
                    ${v.alternative_date ? `<br><strong>Alt:</strong> ${new Date(v.alternative_date + 'T00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} at ${escHtml(v.alternative_time)}` : ''}
                    ${v.message ? `<br><strong>Message:</strong> ${escHtml(v.message)}` : ''}
                </div>
                ${v.replies && v.replies.length ? `
                <div class="reply-thread">
                    ${v.replies.map(r => `
                        <div class="reply-item">
                            <span class="reply-author">${escHtml(r.author_name)}</span>
                            <span class="reply-date">${new Date(r.created_at).toLocaleString()}</span>
                            <div class="reply-message">${escHtml(r.message)}</div>
                        </div>
                    `).join('')}
                </div>` : ''}
                <div class="viewing-actions">
                    ${v.status === 'pending' ? `
                        <button class="btn btn-primary" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="updateViewing(${v.id}, 'confirmed')">Confirm</button>
                        <button class="btn btn-danger" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="updateViewing(${v.id}, 'declined')">Decline</button>
                    ` : ''}
                    ${v.status === 'confirmed' ? `
                        <button class="btn btn-secondary" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="updateViewing(${v.id}, 'completed')">Mark Completed</button>
                    ` : ''}
                    <button class="btn btn-primary" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="toggleReplyForm('viewing', ${v.id})">Reply</button>
                </div>
                <div class="reply-form" id="reply-form-viewing-${v.id}">
                    <textarea id="reply-text-viewing-${v.id}" placeholder="Type your reply..."></textarea>
                    <div class="reply-form-actions">
                        <button class="btn btn-primary" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="sendReply('viewing', ${v.id})">Send Reply</button>
                        <button class="btn btn-secondary" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="toggleReplyForm('viewing', ${v.id})">Cancel</button>
                    </div>
                </div>
            </div>
        `).join('');

        const pagEl = document.getElementById('viewing-pagination');
        pagEl.innerHTML = `
            <button ${!data.previous ? 'disabled' : ''} onclick="viewingPage--; loadViewings();">&laquo; Prev</button>
            <span style="padding:0.4rem 0.5rem; color:#4A5C62; font-size:0.9rem;">Page ${viewingPage}</span>
            <button ${!data.next ? 'disabled' : ''} onclick="viewingPage++; loadViewings();">Next &raquo;</button>
        `;
    }

    async function updateViewing(id, newStatus) {
        await fetch(`/api/viewings/${id}/update_status/`, {
            method: 'PATCH',
            headers: Auth.headers(),
            body: JSON.stringify({ status: newStatus }),
        });
        loadViewings();
    }

    function toggleReplyForm(type, id) {
        const form = document.getElementById(`reply-form-${type}-${id}`);
        if (form) form.classList.toggle('open');
    }

    async function sendReply(type, id) {
        const textarea = document.getElementById(`reply-text-${type}-${id}`);
        const message = textarea.value.trim();
        if (!message) { alert('Please enter a message.'); return; }

        const endpoint = `/api/viewings/${id}/reply/`;

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: Auth.headers(),
                body: JSON.stringify({ message }),
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.detail || 'Failed to send reply.');
            }
            // Reload viewings to show the new reply
            loadViewings();
        } catch (err) {
            alert(err.message || 'Failed to send reply.');
        }
    }

    async function loadDashboardOffers() {
        try {
            const res = await Auth.authFetch('/api/offers/received/', { headers: Auth.headers() });
            const data = await res.json();
            const offers = data.results || data;
            const listEl = document.getElementById('offers-list');

            if (!offers.length) {
                listEl.innerHTML = '<div class="empty-state"><p>No offers received yet.</p></div>';
                return;
            }

            listEl.innerHTML = offers.map(o => `
                <div class="offer-item">
                    <div class="offer-item-header">
                        <div>
                            <span class="enquiry-from">${escHtml(o.buyer_name)}</span>
                            <div class="enquiry-property">Re: ${escHtml(o.property_title)}</div>
                        </div>
                        <div>
                            <span class="offer-status ${escHtml(o.status)}">${escHtml(o.status_display)}</span>
                        </div>
                    </div>
                    <div class="offer-item-amount">&pound;${Number(o.amount).toLocaleString()}</div>
                    <div class="offer-item-attrs">
                        ${o.is_cash_buyer ? '<span class="offer-attr">Cash</span>' : ''}
                        ${o.is_chain_free ? '<span class="offer-attr">No Chain</span>' : ''}
                        ${o.mortgage_agreed ? '<span class="offer-attr">Mortgage</span>' : ''}
                    </div>
                    ${o.message ? `<div class="enquiry-message">${escHtml(o.message)}</div>` : ''}
                    ${o.status === 'submitted' || o.status === 'under_review' ? `
                    <div class="offer-item-actions">
                        <button class="btn btn-primary" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="dashRespondOffer(${o.id}, 'accepted')">Accept</button>
                        <button class="btn btn-danger" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="dashRespondOffer(${o.id}, 'rejected')">Reject</button>
                    </div>` : ''}
                </div>
            `).join('') + '<div style="margin-top:0.75rem;"><a href="/offers/" class="btn btn-secondary" style="font-size:0.85rem;">View all offers &rarr;</a></div>';
        } catch (err) {
            document.getElementById('offers-list').innerHTML = '<div class="empty-state"><p>Failed to load offers.</p></div>';
        }
    }

    async function dashRespondOffer(id, status) {
        const action = status === 'accepted' ? 'accept' : 'reject';
        if (!confirm('Are you sure you want to ' + action + ' this offer?')) return;
        try {
            const res = await Auth.authFetch('/api/offers/' + id + '/respond/', {
                method: 'PATCH',
                headers: Auth.headers(),
                body: JSON.stringify({ status: status }),
            });
            if (!res.ok) throw new Error('Failed');
            loadDashboardOffers();
        } catch (err) {
            alert('Failed to ' + action + ' offer.');
        }
    }

    async function loadDashboardMessages() {
        try {
            const res = await Auth.authFetch('/api/chat-rooms/', { headers: Auth.headers() });
            const data = await res.json();
            const rooms = Array.isArray(data) ? data : (data.results || []);
            const listEl = document.getElementById('messages-list');

            if (!rooms.length) {
                listEl.innerHTML = '<div class="empty-state"><p>No conversations yet.</p></div>';
                return;
            }

            // Fetch current user to determine "other" party
            const userRes = await Auth.authFetch('/auth/users/me/');
            const user = await userRes.json();

            // Sort by last message time
            rooms.sort((a, b) => {
                const aTime = a.last_message?.created_at || a.created_at || '';
                const bTime = b.last_message?.created_at || b.created_at || '';
                return bTime.localeCompare(aTime);
            });

            listEl.innerHTML = rooms.map(room => {
                const otherName = room.buyer === user.id
                    ? (room.seller_name || 'Seller')
                    : (room.buyer_name || 'Buyer');
                const initial = otherName.charAt(0).toUpperCase();
                const lastMsg = room.last_message;
                const preview = lastMsg ? escHtml(lastMsg.message || '').substring(0, 60) : 'No messages yet';
                const unread = room.unread_count || 0;
                const time = lastMsg ? formatMsgTime(lastMsg.created_at) : '';

                return `
                    <div class="msg-item ${unread > 0 ? 'unread' : ''}" onclick="window.location.href='/messages/${room.id}/'">
                        <div class="msg-avatar">${initial}</div>
                        <div class="msg-info">
                            <div class="msg-name">${escHtml(otherName)}</div>
                            <div class="msg-property">Re: ${escHtml(room.property_title || 'Property')}</div>
                            <div class="msg-preview">${preview}</div>
                        </div>
                        <div class="msg-meta">
                            <div class="msg-time">${time}</div>
                            ${unread > 0 ? `<div class="msg-unread-badge">${unread}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('') + '<div style="margin-top:0.75rem;"><a href="/messages/" class="btn btn-secondary" style="font-size:0.85rem;">View all messages &rarr;</a></div>';
        } catch (err) {
            document.getElementById('messages-list').innerHTML = '<div class="empty-state"><p>Failed to load messages.</p></div>';
        }
    }

    function formatMsgTime(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        if (diff < 60000) return 'now';
        if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
        if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
        return date.toLocaleDateString();
    }

    loadDashboard();
</script>
{% endblock %}
