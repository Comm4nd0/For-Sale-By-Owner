name: for_sale_by_owner
description: For Sale By Owner - sell your property without estate agents.

publish_to: 'none'

version: 1.0.20+39

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  sentry_flutter: ^8.9.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon_1024.png"
  adaptive_icon_background: "#19747E"
  adaptive_icon_foreground: "assets/images/app_icon_1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/hero/
