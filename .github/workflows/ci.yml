name: CI

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # requirements.txt is a pip-compile lock. whitenoise and
        # psycopg2-binary aren't in the dev set; they're needed only
        # by the `check --deploy` step below, so we pull them from
        # the prod lock.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install $(grep -E '^(whitenoise|psycopg2-binary)==' requirements-prod.txt)

      - name: Run tests
        env:
          USE_SQLITE: 'True'
          SECRET_KEY: 'ci-test-secret-key'
          DEBUG: 'True'
        run: python manage.py test api sale_tracker --verbosity=2

      - name: Check for migrations
        env:
          USE_SQLITE: 'True'
          SECRET_KEY: 'ci-test-secret-key'
          DEBUG: 'True'
        run: python manage.py makemigrations --check --dry-run

      - name: Check deploy settings
        env:
          # Simulate a production configuration so deployment checks run.
          USE_SQLITE: 'False'
          SECRET_KEY: 'ci-test-secret-key'
          DEBUG: 'False'
          ALLOWED_HOSTS: 'for-sale-by-owner.co.uk'
          DB_NAME: 'ci'
          DB_USER: 'ci'
          DB_PASSWORD: 'ci'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
        # Fail on ERROR-level issues only; warnings print but don't block
        # (SSL redirect is terminated by Caddy so W008 is expected).
        run: python manage.py check --deploy --fail-level ERROR

  flutter-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: my_app
        run: flutter pub get

      - name: Analyze code
        working-directory: my_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: my_app
        run: flutter test
