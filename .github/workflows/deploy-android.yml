name: Build & Deploy Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main, development]
    paths:
      - 'my_app/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: my_app
        run: flutter pub get

      - name: Analyze code
        working-directory: my_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: my_app
        run: flutter test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my_app/android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > my_app/android/key.properties <<'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Install dependencies
        working-directory: my_app
        run: flutter pub get

      - name: Build AAB
        working-directory: my_app
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: my_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(git log --oneline -20 --pretty=format:"• %s")
          else
            NOTES=$(git log --oneline ${PREVIOUS_TAG}..HEAD --pretty=format:"• %s")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Set deploy track
        id: track
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "track=production" >> $GITHUB_OUTPUT
          else
            echo "track=alpha" >> $GITHUB_OUTPUT
          fi

      - name: Create release notes file
        run: |
          mkdir -p distribution/whatsnew
          echo "${{ steps.notes.outputs.notes }}" | grep -v "Co-Authored-By" > distribution/whatsnew/whatsnew-en-GB

      - name: Upload AAB to Google Play (${{ steps.track.outputs.track }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: uk.co.forsalebyowner.android
          releaseFiles: my_app/build/app/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
          whatsNewDirectory: distribution/whatsnew
