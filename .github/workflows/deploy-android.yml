name: Build & Deploy Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main, development]
    paths:
      - 'my_app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my_app/android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > my_app/android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Install dependencies
        working-directory: my_app
        run: flutter pub get

      - name: Build AAB
        working-directory: my_app
        run: flutter build appbundle --release

      - name: Set deploy track
        id: track
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "track=production" >> $GITHUB_OUTPUT
          else
            echo "track=alpha" >> $GITHUB_OUTPUT
          fi

      - name: Upload AAB to Google Play (${{ steps.track.outputs.track }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: uk.co.forsalebyowner.android
          releaseFiles: my_app/build/app/outputs/bundle/release/app-release.aab
          track: ${{ steps.track.outputs.track }}
